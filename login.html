<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — V:L</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>
</head>
<body>
  <div id="login-screen">
    <div class="login-card">
      <div class="login-header">
        <img class="login-logo" src="https://api.sherbert.cimpress.io/v2/assets/F5zyE9WKTEwyS-YQF3fkZ~200?signature=7f0e12c6a8f73ddad968a67bc734a472c8876d74" alt="V:L"/>
        <div class="login-title" id="login-title">Vision: Learning</div>
      </div>
      <div class="login-body">

        <!-- Google -->
        <button class="login-oauth-btn" id="google-btn">
          <svg class="google-svg" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign in with Google
        </button>

        <!-- Clever -->
        <button class="login-oauth-btn" id="clever-btn">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
            <circle cx="12" cy="12" r="11" fill="#4274f4"/>
            <path d="M16.5 8.5A5.5 5.5 0 1 0 16.5 15.5" stroke="#fff" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          </svg>
          Sign in with Clever
        </button>

        <div class="login-divider"><span>or</span></div>

        <div class="login-field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@school.edu"/>
        </div>
        <div class="login-field">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••"/>
        </div>

        <button class="login-submit" id="login-btn">Sign In</button>

        <div class="login-rep-link">No account? <a href="signup.html">Sign up here</a></div>
        <div class="login-rep-link">Representative? <a href="login.html?role=teacher">Sign in here</a></div>
      </div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="app.js"></script>
  <script>
    var params = new URLSearchParams(location.search);
    var isTeacher = params.get('role') === 'teacher';
    if (isTeacher) {
      document.getElementById('login-title').textContent = 'Representative Login';
      document.getElementById('login-btn').textContent = 'Sign In as Representative';
    }

    document.getElementById('google-btn').addEventListener('click', function() {
      var provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      firebase.auth().signInWithPopup(provider).then(function() {
        window.location.href = isTeacher ? 'teacher-home.html' : 'student-home.html';
      }).catch(function(e) { showToast(e.message, 'error'); });
    });

    document.getElementById('clever-btn').addEventListener('click', function() {
      showToast('Clever SSO coming soon', 'error');
    });

    document.getElementById('login-btn').addEventListener('click', function() {
      var email = document.getElementById('login-email').value.trim();
      var pass  = document.getElementById('login-password').value;
      if (!email || !pass) return showToast('Fill in all fields', 'error');
      firebase.auth().signInWithEmailAndPassword(email, pass).then(function() {
        window.location.href = isTeacher ? 'teacher-home.html' : 'student-home.html';
      }).catch(function() { showToast('Invalid credentials', 'error'); });
    });
  </script>
</body>
</html>
