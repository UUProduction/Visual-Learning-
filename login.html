<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — V:L</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
</head>
<body>
  <div id="login-screen">
    <div class="login-card">
      <div class="login-header">
        <img class="login-logo" src="https://api.sherbert.cimpress.io/v2/assets/F5zyE9WKTEwyS-YQF3fkZ~200?signature=7f0e12c6a8f73ddad968a67bc734a472c8876d74" alt="V:L"/>
        <div class="login-title" id="login-title">Vision: Learning</div>
      </div>
      <div class="login-body">
        <button class="login-oauth-btn" id="google-btn">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/>
          Sign in with Google
        </button>
        <button class="login-oauth-btn" id="clever-btn">
          <img src="https://support.highlandschools.org/wp-content/uploads/2020/11/clever1.png" alt="Clever"/>
          Sign in with Clever
        </button>
        <div class="login-divider"><span>or</span></div>
        <div class="login-field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@school.edu"/>
        </div>
        <div class="login-field">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••"/>
        </div>
        <button class="login-submit" id="login-btn">Sign In</button>
        <div class="login-rep-link">No account? <a href="signup.html">Sign up here</a></div>
      </div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="app.js"></script>
  <script>
    function redirectByRole(role) {
      if (role === 'admin')   { window.location.href = 'admin-home.html';   return; }
      if (role === 'teacher') { window.location.href = 'teacher-home.html'; return; }
      window.location.href = 'student-home.html';
    }

    firebase.auth().onAuthStateChanged(function(user) {
      if (!user) return;
      firebase.firestore().collection('users').doc(user.uid).get().then(function(doc) {
        if (!doc.exists) return;
        var data = doc.data();
        if (data.banned) {
          firebase.auth().signOut();
          showToast('Your account has been banned', 'error');
          return;
        }
        redirectByRole(data.role);
      });
    });

    document.getElementById('google-btn').addEventListener('click', function() {
      var provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      firebase.auth().signInWithPopup(provider).then(function(result) {
        firebase.firestore().collection('users').doc(result.user.uid).get().then(function(doc) {
          if (doc.exists) {
            var data = doc.data();
            if (data.banned) {
              firebase.auth().signOut();
              return showToast('Your account has been banned', 'error');
            }
            redirectByRole(data.role);
          } else {
            firebase.firestore().collection('users').doc(result.user.uid).set({
              name: result.user.displayName || '',
              email: result.user.email || '',
              photoURL: result.user.photoURL || null,
              role: 'student',
              totalPoints: 0,
              totalAnswered: 0,
              bestStreak: 0,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(function() {
              redirectByRole('student');
            });
          }
        });
      }).catch(function(e) { showToast(e.message, 'error'); });
    });

    document.getElementById('clever-btn').addEventListener('click', function() {
      showToast('Clever SSO coming soon', 'error');
    });

    document.getElementById('login-btn').addEventListener('click', function() {
      var email = document.getElementById('login-email').value.trim();
      var pass  = document.getElementById('login-password').value;
      if (!email || !pass) return showToast('Fill in all fields', 'error');
      firebase.auth().signInWithEmailAndPassword(email, pass).then(function(result) {
        firebase.firestore().collection('users').doc(result.user.uid).get().then(function(doc) {
          if (doc.exists) {
            var data = doc.data();
            if (data.banned) {
              firebase.auth().signOut();
              return showToast('Your account has been banned', 'error');
            }
            redirectByRole(data.role);
          } else {
            redirectByRole('student');
          }
        });
      }).catch(function() { showToast('Invalid credentials', 'error'); });
    });
  </script>
</body>
</html>
