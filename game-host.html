<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game Host — V:L</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <style>
    body{background:var(--vl-darker);}
    .host-shell{display:grid;grid-template-columns:300px 1fr;height:100vh;overflow:hidden;}
    .host-panel{background:#020c1e;border-right:1px solid var(--vl-border);display:flex;flex-direction:column;overflow:hidden;}
    .host-panel-top{padding:16px;border-bottom:1px solid var(--vl-border);}
    .host-brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.1em;color:var(--vl-white);}
    .host-brand span{color:var(--vl-cyan);}
    .host-room-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--vl-gray);margin-top:4px;}
    .host-questions-list{flex:1;overflow-y:auto;padding:10px;}
    .host-q-item{background:var(--vl-surface);border:1px solid var(--vl-border);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:border-color 0.15s;}
    .host-q-item:hover{border-color:rgba(10,132,255,0.35);}
    .host-q-item.active{border-color:var(--vl-blue);background:rgba(10,132,255,0.07);}
    .host-q-num{font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--vl-gray);}
    .host-q-text{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--vl-white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
    .host-q-meta{font-size:10px;color:var(--vl-gray);margin-top:2px;}
    .host-panel-bottom{padding:12px;border-top:1px solid var(--vl-border);display:flex;flex-direction:column;gap:8px;}
    .live-scores-list{padding:10px;overflow-y:auto;flex:1;}
    .ls-row{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;background:rgba(255,255,255,0.03);margin-bottom:4px;}
    .ls-rank{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--vl-gray);width:18px;text-align:center;flex-shrink:0;}
    .ls-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--vl-white);}
    .ls-pts{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--vl-cyan);}
    .ls-dot{width:7px;height:7px;border-radius:50%;background:var(--vl-green);flex-shrink:0;}
    .host-main{display:flex;flex-direction:column;overflow:hidden;}
    .host-topbar{background:rgba(0,40,140,0.97);border-bottom:2px solid var(--vl-cyan);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .host-topbar-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.08em;color:#fff;}
    .host-code-badge{background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.3);border-radius:6px;padding:4px 12px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.18em;color:var(--vl-cyan);}
    .host-players-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:rgba(255,255,255,0.6);}
    .host-content{flex:1;overflow-y:auto;padding:22px;}
    /* SETUP */
    .setup-wrap{max-width:780px;margin:0 auto;}
    .setup-h{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:0.06em;color:var(--vl-white);margin-bottom:4px;}
    .setup-sub{font-size:13px;color:var(--vl-gray);margin-bottom:20px;}
    .q-builder{background:var(--vl-surface);border:1px solid var(--vl-border);border-radius:12px;padding:20px;margin-bottom:14px;}
    .q-builder-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
    .field-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--vl-gray);}
    .type-pills{display:flex;gap:5px;}
    .type-pill{padding:4px 11px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--vl-gray);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;}
    .type-pill.active{background:rgba(10,132,255,0.18);border-color:var(--vl-blue);color:var(--vl-blue);}
    .vl-textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:11px 13px;color:var(--vl-white);font-family:'Barlow',sans-serif;font-size:14px;outline:none;resize:none;transition:border-color 0.2s;margin-bottom:12px;box-sizing:border-box;}
    .vl-textarea:focus{border-color:var(--vl-blue);}
    .vl-textarea::placeholder{color:var(--vl-gray);}
    .answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
    .ans-row{display:flex;align-items:center;gap:7px;}
    .ans-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
    .ans-correct-btn{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.18);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
    .ans-correct-btn.on{background:#30d158;border-color:#30d158;}
    .ans-correct-btn.on::after{content:'✓';color:#fff;font-size:10px;font-weight:700;}
    .ans-inp{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:8px 10px;color:var(--vl-white);font-family:'Barlow',sans-serif;font-size:13px;outline:none;}
    .ans-inp:focus{border-color:var(--vl-blue);}
    .ans-inp::placeholder{color:var(--vl-gray);}
    .settings-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
    .setting-group{display:flex;align-items:center;gap:7px;}
    .setting-group label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--vl-gray);}
    .setting-group input[type=number],.setting-group select{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:6px 9px;color:var(--vl-white);font-family:'Barlow Condensed',sans-serif;font-size:13px;outline:none;width:80px;}
    .csv-zone{border:2px dashed rgba(255,255,255,0.1);border-radius:10px;padding:22px;text-align:center;cursor:pointer;transition:border-color 0.2s;margin-bottom:14px;}
    .csv-zone:hover{border-color:var(--vl-blue);}
    .csv-zone p{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--vl-gray);margin-top:6px;}
    /* LOBBY */
    .lobby-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;padding:10px 0;}
    .lobby-code-big{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,9vw,96px);color:var(--vl-gold);letter-spacing:0.22em;text-shadow:0 0 28px rgba(255,215,0,0.3);line-height:1;}
    .lobby-hint{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:0.25em;text-transform:uppercase;color:var(--vl-gray);}
    .lobby-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:680px;}
    .lchip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:30px;padding:7px 14px;animation:chip-pop 0.3s cubic-bezier(.17,.67,.3,1.5);}
    @keyframes chip-pop{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
    .lchip img{width:26px;height:26px;border-radius:50%;object-fit:cover;}
    .lchip-letter{width:26px;height:26px;border-radius:50%;background:var(--vl-blue);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:#fff;}
    .lchip span{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--vl-white);}
    .lobby-count{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:var(--vl-gray);letter-spacing:0.08em;}
    /* QUESTION */
    .q-screen{display:flex;flex-direction:column;align-items:center;gap:14px;}
    .q-prog{width:100%;max-width:680px;display:flex;align-items:center;gap:10px;}
    .q-prog-bar{flex:1;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;}
    .q-prog-fill{height:100%;background:var(--vl-blue);border-radius:3px;transition:width 0.3s;}
    .q-prog-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--vl-gray);white-space:nowrap;}
    .q-timer{font-family:'Bebas Neue',sans-serif;font-size:68px;line-height:1;text-align:center;transition:color 0.3s;}
    .q-card{width:100%;max-width:680px;background:var(--vl-surface);border:1px solid var(--vl-border);border-radius:14px;padding:24px;text-align:center;}
    .q-card-text{font-family:'Barlow',sans-serif;font-size:clamp(17px,2.5vw,24px);font-weight:600;color:var(--vl-white);line-height:1.4;}
    .q-answers{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:680px;}
    .q-ans{border-radius:11px;padding:16px 14px;display:flex;align-items:center;gap:10px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:#fff;cursor:default;}
    .q-ans-icon{width:30px;height:30px;border-radius:7px;background:rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
    .q-ans.reveal-correct{box-shadow:0 0 20px rgba(48,209,88,0.5);transform:scale(1.02);}
    .q-ans.reveal-wrong{opacity:0.28;}
    .answered-info{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--vl-gray);}
    /* RESULTS */
    .results-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;max-width:560px;margin:0 auto;}
    .results-h{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:0.07em;color:var(--vl-white);}
    .result-ans-reveal{width:100%;}
    .results-list{width:100%;display:flex;flex-direction:column;gap:7px;}
    .r-row{display:flex;align-items:center;gap:10px;background:var(--vl-surface);border:1px solid var(--vl-border);border-radius:9px;padding:11px 14px;}
    /* PODIUM */
    .podium-wrap-outer{display:flex;flex-direction:column;align-items:center;gap:20px;}
    .podium-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(38px,7vw,68px);letter-spacing:0.08em;color:var(--vl-gold);text-shadow:0 0 30px rgba(255,215,0,0.4);animation:glow 2s infinite;}
    @keyframes glow{0%,100%{text-shadow:0 0 30px rgba(255,215,0,0.4);}50%{text-shadow:0 0 70px rgba(255,215,0,0.8);}}
    .podium-stage{display:flex;align-items:flex-end;gap:10px;justify-content:center;}
    .podium-block{display:flex;flex-direction:column;align-items:center;gap:6px;}
    .podium-bar{border-radius:8px 8px 0 0;width:86px;display:flex;align-items:flex-start;justify-content:center;padding-top:10px;font-size:32px;}
    .pb-1{background:linear-gradient(180deg,rgba(255,215,0,0.25),rgba(255,215,0,0.08));border:1px solid rgba(255,215,0,0.35);height:130px;}
    .pb-2{background:linear-gradient(180deg,rgba(192,192,192,0.2),rgba(192,192,192,0.06));border:1px solid rgba(192,192,192,0.25);height:90px;}
    .pb-3{background:linear-gradient(180deg,rgba(205,127,50,0.2),rgba(205,127,50,0.06));border:1px solid rgba(205,127,50,0.25);height:64px;}
    .podium-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--vl-white);text-align:center;max-width:86px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .podium-pts{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--vl-cyan);}
    .podium-rest{width:100%;max-width:480px;display:flex;flex-direction:column;gap:5px;}
    @media(max-width:700px){.host-shell{grid-template-columns:1fr;}.host-panel{display:none;}.q-answers{grid-template-columns:1fr;}}
    .cls-select{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:8px 10px;color:var(--vl-white);font-family:'Barlow Condensed',sans-serif;font-size:13px;outline:none;margin-bottom:4px;}
  </style>
</head>
<body>
<div class="host-shell">

  <!-- LEFT PANEL -->
  <div class="host-panel">
    <div class="host-panel-top">
      <div class="host-brand">V<span>:</span>L HOST</div>
      <div class="host-room-label" id="panel-room-label">No classroom selected</div>
    </div>
    <div class="host-questions-list" id="q-sidebar" style="display:block;">
      <div style="color:var(--vl-gray);font-size:12px;padding:12px;text-align:center;">Add questions to get started</div>
    </div>
    <div class="live-scores-list hidden" id="live-scores-panel"></div>
    <div class="host-panel-bottom">
      <div id="cls-selector-wrap"></div>
      <button class="btn-primary" id="start-btn" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Start Game
      </button>
      <a href="teacher-home.html" class="btn-ghost" style="text-align:center;text-decoration:none;display:block;padding:8px;">← Back</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="host-main">
    <div class="host-topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="host-topbar-title">Game Host</div>
        <div class="host-code-badge" id="topbar-code" style="display:none;"></div>
        <div class="host-players-label" id="topbar-players"></div>
      </div>
      <div id="topbar-actions" style="display:flex;gap:8px;"></div>
    </div>
    <div class="host-content" id="host-content"></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="app.js"></script>
<script>
var me = null;
var myRooms = [];
var selectedRoom = null;
var questions = [];
var editIdx = -1;
var gamePhase = 'setup';
var currentQIdx = 0;
var timerInterval = null;
var timerLeft = 0;
var unsubGame = null;
var players = {};
var correctIdx = 0;

var COLORS = ['#e53935','#1e88e5','#f9a825','#43a047'];
var ICONS  = ['▲','◆','●','✕'];

firebase.auth().onAuthStateChanged(function(u) {
  if (!u) return window.location.href = 'login.html';
  me = u;
  loadRooms();
  renderSetup();
});

// ===== LOAD CLASSROOMS =====
function loadRooms() {
  firebase.firestore().collection('classrooms').where('teacherId','==',me.uid).get().then(function(snap) {
    myRooms = snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
    var wrap = document.getElementById('cls-selector-wrap');
    if (!myRooms.length) { wrap.innerHTML='<div style="font-size:12px;color:var(--vl-gray);">No classrooms yet</div>'; return; }
    wrap.innerHTML = '<div class="field-label" style="margin-bottom:5px;">Classroom</div>';
    var sel = document.createElement('select');
    sel.className = 'cls-select';
    var opt0 = document.createElement('option'); opt0.value=''; opt0.textContent='Select classroom...'; sel.appendChild(opt0);
    myRooms.forEach(function(r){
      var o=document.createElement('option'); o.value=r.code; o.textContent=r.name+' ('+r.code+')'; sel.appendChild(o);
    });
    sel.onchange = function() {
      selectedRoom = myRooms.find(function(r){ return r.code===sel.value; })||null;
      document.getElementById('panel-room-label').textContent = selectedRoom ? selectedRoom.name : 'No classroom selected';
      document.getElementById('topbar-code').style.display = selectedRoom ? '' : 'none';
      document.getElementById('topbar-code').textContent = selectedRoom ? selectedRoom.code : '';
      checkStartBtn();
    };
    wrap.appendChild(sel);
  });
}

function checkStartBtn() {
  var btn = document.getElementById('start-btn');
  btn.style.display = (selectedRoom && questions.length > 0) ? '' : 'none';
}

// ===== SETUP SCREEN =====
function renderSetup() {
  var c = document.getElementById('host-content');
  c.innerHTML = `
    <div class="setup-wrap">
      <div class="setup-h">Build Your Game</div>
      <div class="setup-sub">Add questions manually or upload a CSV</div>
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
        <button class="btn-primary" id="add-mc-btn">+ Multiple Choice</button>
        <button class="btn-primary" id="add-tf-btn" style="background:rgba(10,132,255,0.3);">+ True / False</button>
        <button class="btn-primary" id="add-type-btn" style="background:rgba(191,90,242,0.3);">+ Type Answer</button>
        <label class="btn-ghost" style="cursor:pointer;display:inline-flex;align-items:center;gap:6px;">
          ↑ Upload CSV
          <input type="file" id="csv-inp" accept=".csv" style="display:none;"/>
        </label>
      </div>
      <div id="q-editor"></div>
      <div style="margin-top:14px;padding:12px;background:var(--vl-surface);border:1px solid var(--vl-border);border-radius:9px;">
        <div class="field-label" style="margin-bottom:6px;">CSV Format</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--vl-gray);line-height:1.9;">
          type, question, a1, a2, a3, a4, correct(0-3), points, time<br/>
          mc, What is 2+2?, 4, 3, 5, 6, 0, 1000, 20<br/>
          tf, The sky is blue, True, False, , , 0, 500, 15<br/>
          type, Capital of France?, Paris, , , , 0, 1000, 30
        </div>
      </div>
    </div>
  `;
  document.getElementById('add-mc-btn').onclick   = function(){ openEditor('mc',-1); };
  document.getElementById('add-tf-btn').onclick   = function(){ openEditor('tf',-1); };
  document.getElementById('add-type-btn').onclick = function(){ openEditor('type',-1); };
  document.getElementById('csv-inp').onchange     = handleCSV;
  renderSidebar();
}

// ===== EDITOR =====
function openEditor(type, idx) {
  editIdx = idx;
  correctIdx = 0;
  var ex = idx >= 0 ? questions[idx] : null;
  var qtype = ex ? ex.type : type;
  var c = document.getElementById('q-editor');
  c.innerHTML = `
    <div class="q-builder">
      <div class="q-builder-row">
        <div class="field-label">${idx>=0?'Edit':'New'} Question</div>
        <div class="type-pills">
          <button class="type-pill ${qtype==='mc'?'active':''}"   onclick="openEditor('mc',${idx})">MC</button>
          <button class="type-pill ${qtype==='tf'?'active':''}"   onclick="openEditor('tf',${idx})">T/F</button>
          <button class="type-pill ${qtype==='type'?'active':''}" onclick="openEditor('type',${idx})">Type</button>
        </div>
      </div>
      <textarea class="vl-textarea" id="q-text" rows="3" placeholder="Enter your question...">${ex?ex.question:''}</textarea>
      <div id="q-answers-area"></div>
      <div class="settings-row">
        <div class="setting-group"><label>Points</label><input type="number" id="q-pts" value="${ex?ex.points:1000}" min="100" max="5000" step="100"/></div>
        <div class="setting-group"><label>Time (s)</label><input type="number" id="q-time" value="${ex?ex.time:20}" min="5" max="120" step="5"/></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:14px;">
        <button class="btn-primary" onclick="saveQ('${qtype}')">${idx>=0?'Update':'Add Question'}</button>
        ${idx>=0?`<button class="btn-ghost" onclick="deleteQ(${idx})">Delete</button>`:''}
        <button class="btn-ghost" onclick="document.getElementById('q-editor').innerHTML=''">Cancel</button>
      </div>
    </div>
  `;

  var aa = document.getElementById('q-answers-area');
  if (qtype === 'mc') {
    var defs = ex ? ex.answers : ['','','',''];
    var cor  = ex ? ex.correct : 0;
    correctIdx = cor;
    aa.innerHTML = '<div class="answers-grid" id="mc-grid"></div>';
    var grid = document.getElementById('mc-grid');
    defs.forEach(function(a,i){
      var row=document.createElement('div'); row.className='ans-row';
      row.innerHTML='<div class="ans-dot" style="background:'+COLORS[i]+'"></div>'+
        '<button class="ans-correct-btn'+(cor===i?' on':'')+'" id="cbtn-'+i+'" onclick="setCorrect('+i+')"></button>'+
        '<input class="ans-inp" id="ans-'+i+'" placeholder="Answer '+(i+1)+'..." value="'+(a||'')+'" />';
      grid.appendChild(row);
    });
  } else if (qtype === 'tf') {
    correctIdx = ex ? ex.correct : 0;
    aa.innerHTML=`<div style="display:flex;gap:10px;margin-bottom:12px;">
      <div class="ans-row" style="flex:1;"><div class="ans-dot" style="background:#43a047"></div>
        <button class="ans-correct-btn ${correctIdx===0?'on':''}" id="tbtn-0" onclick="setCorrectTF(0)"></button>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--vl-white);">True</span></div>
      <div class="ans-row" style="flex:1;"><div class="ans-dot" style="background:#e53935"></div>
        <button class="ans-correct-btn ${correctIdx===1?'on':''}" id="tbtn-1" onclick="setCorrectTF(1)"></button>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--vl-white);">False</span></div>
    </div>`;
  } else {
    aa.innerHTML='<div style="margin-bottom:12px;"><div class="field-label" style="margin-bottom:6px;">Correct Answer</div>'+
      '<input class="ans-inp" id="type-ans" style="width:100%;" placeholder="Type the correct answer..." value="'+(ex&&ex.answer?ex.answer:'')+'" /></div>';
  }
}

function setCorrect(i) {
  correctIdx = i;
  for(var j=0;j<4;j++){var b=document.getElementById('cbtn-'+j);if(b){b.className='ans-correct-btn'+(j===i?' on':'');}}
}
function setCorrectTF(i) {
  correctIdx = i;
  [0,1].forEach(function(j){var b=document.getElementById('tbtn-'+j);if(b){b.className='ans-correct-btn'+(j===i?' on':'');}});
}

function saveQ(type) {
  var text = document.getElementById('q-text').value.trim();
  if (!text) return showToast('Enter a question','error');
  var pts  = parseInt(document.getElementById('q-pts').value)||1000;
  var time = parseInt(document.getElementById('q-time').value)||20;
  var q = { type:type, question:text, points:pts, time:time };
  if (type==='mc') {
    var ans=[0,1,2,3].map(function(i){return document.getElementById('ans-'+i).value.trim();});
    if(ans.filter(Boolean).length<2) return showToast('Add at least 2 answers','error');
    q.answers=ans; q.correct=correctIdx;
  } else if (type==='tf') {
    q.answers=['True','False']; q.correct=correctIdx;
  } else {
    var a=document.getElementById('type-ans').value.trim();
    if(!a) return showToast('Enter the correct answer','error');
    q.answer=a;
  }
  if (editIdx>=0) questions[editIdx]=q; else questions.push(q);
  document.getElementById('q-editor').innerHTML='';
  renderSidebar();
  checkStartBtn();
  showToast(editIdx>=0?'Updated':'Question added','success');
  editIdx=-1;
}

function deleteQ(i) {
  questions.splice(i,1);
  document.getElementById('q-editor').innerHTML='';
  renderSidebar();
  checkStartBtn();
}

function renderSidebar() {
  var s = document.getElementById('q-sidebar');
  s.innerHTML='';
  if(!questions.length){ s.innerHTML='<div style="color:var(--vl-gray);font-size:12px;padding:12px;text-align:center;">No questions yet</div>'; return; }
  questions.forEach(function(q,i){
    var item=document.createElement('div'); item.className='host-q-item';
    item.innerHTML='<div class="host-q-num">Q'+(i+1)+'</div><div class="host-q-text">'+q.question+'</div><div class="host-q-meta">'+q.type.toUpperCase()+' · '+q.points+' pts · '+q.time+'s</div>';
    item.onclick=function(){ openEditor(q.type,i); };
    s.appendChild(item);
  });
}

function handleCSV(e) {
  var file=e.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var lines=ev.target.result.split('\n').filter(Boolean);
    var added=0;
    lines.forEach(function(line,i){
      if(i===0&&line.toLowerCase().startsWith('type')) return;
      var cols=line.split(',');
      var type=(cols[0]||'').trim().toLowerCase();
      var question=(cols[1]||'').trim();
      if(!question) return;
      var q={type:type,question:question,points:parseInt(cols[7])||1000,time:parseInt(cols[8])||20};
      if(type==='mc'){ q.answers=[cols[2],cols[3],cols[4],cols[5]].map(function(c){return(c||'').trim();}); q.correct=parseInt(cols[6])||0; }
      else if(type==='tf'){ q.answers=['True','False']; q.correct=parseInt(cols[6])||0; }
      else { q.answer=(cols[2]||'').trim(); }
      questions.push(q); added++;
    });
    renderSidebar(); checkStartBtn();
    showToast(added+' questions loaded','success');
  };
  reader.readAsText(file);
}

// ===== START GAME =====
document.getElementById('start-btn').onclick = function() {
  if (!selectedRoom) return showToast('Select a classroom first','error');
  if (!questions.length) return showToast('Add at least one question','error');
  players = {};
  currentQIdx = 0;
  gamePhase = 'lobby';

  // Write session to Firestore under the classroom
  firebase.firestore()
    .collection('classrooms').doc(selectedRoom.code)
    .collection('gamehost').doc('session')
    .set({
      status: 'lobby',
      teacherId: me.uid,
      teacherName: me.displayName||'Teacher',
      classroomCode: selectedRoom.code,
      totalQuestions: questions.length,
      currentQuestion: -1,
      questionData: null,
      players: {},
      startedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(function() {
      console.log('[HOST] Session written to classrooms/'+selectedRoom.code+'/gamehost/session');
      showToast('Game created! Waiting for players...','success');
      renderLobby();
      listenSession();
    }).catch(function(err){
      console.error('[HOST] Failed to write session:', err);
      showToast('Error: '+err.message,'error');
    });
};

// ===== LISTEN SESSION =====
function listenSession() {
  if (unsubGame) unsubGame();
  unsubGame = firebase.firestore()
    .collection('classrooms').doc(selectedRoom.code)
    .collection('gamehost').doc('session')
    .onSnapshot(function(snap) {
      if (!snap.exists) return;
      var data = snap.data();
      players = data.players || {};
      var count = Object.keys(players).length;
      var tpEl = document.getElementById('topbar-players');
      if (tpEl) tpEl.textContent = count+' player'+(count!==1?'s':'')+' joined';
      var lcEl = document.getElementById('lobby-count-el');
      if (lcEl) lcEl.textContent = count+' player'+(count!==1?'s':'')+' joined';
      updateLobbyChips();
      updateLiveScores();
      updateAnsweredCount();
    }, function(err){ console.error('[HOST] snapshot error:', err); });
}

function updateLobbyChips() {
  var grid = document.getElementById('lobby-chips-grid');
  if (!grid) return;
  grid.innerHTML = '';
  Object.values(players).forEach(function(p){
    var chip=document.createElement('div'); chip.className='lchip';
    chip.innerHTML=(p.photoURL?'<img src="'+p.photoURL+'" alt=""/>':'<div class="lchip-letter">'+(p.name||'P')[0]+'</div>')+'<span>'+(p.name||'Player')+'</span>';
    grid.appendChild(chip);
  });
}

function updateLiveScores() {
  var panel = document.getElementById('live-scores-panel');
  if (!panel || gamePhase === 'lobby' || gamePhase === 'setup') return;
  panel.innerHTML = '';
  Object.values(players).sort(function(a,b){return (b.score||0)-(a.score||0);}).forEach(function(p,i){
    var row=document.createElement('div'); row.className='ls-row';
    row.innerHTML='<div class="ls-rank">'+(i+1)+'</div>'+
      (p.photoURL?'<img src="'+p.photoURL+'" width="22" height="22" style="border-radius:50%;object-fit:cover;flex-shrink:0;" alt=""/>':'<div style="width:22px;height:22px;border-radius:50%;background:var(--vl-blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;">'+(p.name||'P')[0]+'</div>')+
      '<div class="ls-name">'+(p.name||'Player')+'</div>'+
      (p.answeredCurrent?'<div class="ls-dot"></div>':'')+
      '<div class="ls-pts">'+(p.score||0)+'</div>';
    panel.appendChild(row);
  });
}

function updateAnsweredCount() {
  var el = document.getElementById('answered-count-el');
  if (!el) return;
  var total = Object.keys(players).length;
  var answered = Object.values(players).filter(function(p){ return p.answeredCurrent; }).length;
  el.textContent = answered+' / '+total+' answered';
}

// ===== LOBBY SCREEN =====
function renderLobby() {
  document.getElementById('q-sidebar').classList.add('hidden');
  document.getElementById('live-scores-panel').classList.add('hidden');
  document.getElementById('start-btn').style.display = 'none';
  document.getElementById('topbar-code').style.display = '';
  document.getElementById('topbar-code').textContent = selectedRoom.code;

  var actions = document.getElementById('topbar-actions');
  actions.innerHTML = '<button class="btn-primary" id="launch-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polygon points="5 3 19 12 5 21 5 3"/></svg> Launch</button>';
  document.getElementById('launch-btn').onclick = launchGame;

  document.getElementById('host-content').innerHTML = `
    <div class="lobby-wrap">
      <div class="lobby-hint">Room Code</div>
      <div class="lobby-code-big">${selectedRoom.code}</div>
      <div class="lobby-hint">${selectedRoom.name}</div>
      <div class="lobby-count" id="lobby-count-el">Waiting for players...</div>
      <div class="lobby-chips" id="lobby-chips-grid"></div>
    </div>
  `;
}

// ===== LAUNCH =====
function launchGame() {
  if (!Object.keys(players).length) return showToast('Wait for at least 1 player','error');
  showQuestion(0);
}

// ===== SHOW QUESTION =====
function showQuestion(idx) {
  if (idx >= questions.length) { endGame(); return; }
  currentQIdx = idx;
  gamePhase = 'question';
  var q = questions[idx];
  timerLeft = q.time;

  // Show live scores in sidebar
  document.getElementById('live-scores-panel').classList.remove('hidden');
  document.getElementById('live-scores-panel').innerHTML = '';

  // Reset answeredCurrent for all players
  var upd = {
    status: 'question',
    currentQuestion: idx,
    questionStartedAt: firebase.firestore.FieldValue.serverTimestamp(),
    questionData: {
      type: q.type,
      question: q.question,
      answers: q.answers || [],
      answer: q.answer || '',
      correct: q.correct !== undefined ? q.correct : -1,
      points: q.points,
      time: q.time
    }
  };
  Object.keys(players).forEach(function(uid){
    upd['players.'+uid+'.answeredCurrent'] = false;
    upd['players.'+uid+'.lastAnswer'] = '';
    upd['players.'+uid+'.lastAnswerIndex'] = -1;
  });

  firebase.firestore().collection('classrooms').doc(selectedRoom.code)
    .collection('gamehost').doc('session').update(upd);

  renderQuestionScreen(q, idx);

  // Timer
  clearInterval(timerInterval);
  timerInterval = setInterval(function(){
    timerLeft--;
    var el = document.getElementById('q-timer-el');
    if (el) {
      el.textContent = timerLeft;
      el.style.color = timerLeft<=5 ? '#ff3b30' : timerLeft<=10 ? '#f9a825' : 'var(--vl-white)';
    }
    if (timerLeft <= 0) { clearInterval(timerInterval); revealAnswer(); }
  }, 1000);
}

function renderQuestionScreen(q, idx) {
  document.getElementById('topbar-actions').innerHTML =
    '<button class="btn-ghost" onclick="skipTimer()">Skip Timer</button>';

  var answersHtml = '';
  if (q.type==='mc'||q.type==='tf') {
    var ans = q.answers||[];
    answersHtml = '<div class="q-answers">';
    ans.forEach(function(a,i){
      if(!a) return;
      answersHtml += `<div class="q-ans" id="qans-${i}" style="background:linear-gradient(135deg,${COLORS[i]},${COLORS[i]}cc);"><div class="q-ans-icon">${ICONS[i]}</div>${a}</div>`;
    });
    answersHtml += '</div>';
  } else {
    answersHtml = '<div style="background:var(--vl-surface);border:1px solid var(--vl-border);border-radius:11px;padding:18px;text-align:center;font-family:\'Barlow Condensed\',sans-serif;font-size:15px;color:var(--vl-gray);width:100%;max-width:680px;">Students type their answer</div>';
  }

  document.getElementById('host-content').innerHTML = `
    <div class="q-screen">
      <div class="q-prog" style="width:100%;max-width:680px;">
        <div class="q-prog-bar"><div class="q-prog-fill" style="width:${((idx+1)/questions.length)*100}%"></div></div>
        <div class="q-prog-label">Q${idx+1} / ${questions.length}</div>
      </div>
      <div class="q-timer" id="q-timer-el">${q.time}</div>
      <div class="q-card"><div class="q-card-text">${q.question}</div></div>
      ${answersHtml}
      <div class="answered-info" id="answered-count-el">0 / ${Object.keys(players).length} answered</div>
    </div>
  `;
}

function skipTimer() { clearInterval(timerInterval); revealAnswer(); }

// ===== REVEAL ANSWER =====
function revealAnswer() {
  gamePhase = 'reveal';
  var q = questions[currentQIdx];

  firebase.firestore().collection('classrooms').doc(selectedRoom.code)
    .collection('gamehost').doc('session').update({ status: 'reveal' });

  // Score players
  var batch = {};
  Object.entries(players).forEach(function(entry){
    var uid = entry[0], p = entry[1];
    var isCorrect = false;
    if (q.type==='mc'||q.type==='tf') {
      isCorrect = p.lastAnswerIndex === q.correct;
    } else {
      isCorrect = (p.lastAnswer||'').toLowerCase().trim() === (q.answer||'').toLowerCase().trim();
    }
    var ptsEarned = 0;
    if (isCorrect) {
      ptsEarned = Math.floor(q.points * 0.5);
      // Speed bonus — up to 50% extra
      if (p.answeredAt) {
        var elapsed = (p.answeredAt - (Date.now() - (q.time*1000)));
        var speedPct = Math.max(0, Math.min(1, 1 - elapsed/(q.time*1000)));
        ptsEarned += Math.floor(q.points * 0.5 * speedPct);
      }
      // Streak bonus
      var streak = (p.streak||0) + 1;
      if (streak >= 3) ptsEarned += Math.floor(q.points * 0.25);
      batch['players.'+uid+'.score'] = (p.score||0) + ptsEarned;
      batch['players.'+uid+'.streak'] = streak;
    } else {
      batch['players.'+uid+'.streak'] = 0;
    }
    batch['players.'+uid+'.lastCorrect'] = isCorrect;
    batch['players.'+uid+'.lastPts'] = ptsEarned;
  });

  firebase.firestore().collection('classrooms').doc(selectedRoom.code)
    .collection('gamehost').doc('session').update(batch);

  renderRevealScreen(q);

  document.getElementById('topbar-actions').innerHTML =
    '<button class="btn-primary" id="next-btn">'+(currentQIdx+1<questions.length?'Next Question →':'See Podium 🏆')+'</button>';
  document.getElementById('next-btn').onclick = function(){
    if (currentQIdx+1 < questions.length) showQuestion(currentQIdx+1);
    else endGame();
  };
}

function renderRevealScreen(q) {
  var answersHtml = '';
  if (q.type==='mc'||q.type==='tf') {
    var ans = q.answers||[];
    answersHtml = '<div class="q-answers" style="pointer-events:none;">';
    ans.forEach(function(a,i){
      if(!a) return;
      var isC = i===q.correct;
      answersHtml += `<div class="q-ans ${isC?'reveal-correct':'reveal-wrong'}" style="background:linear-gradient(135deg,${COLORS[i]},${COLORS[i]}cc);"><div class="q-ans-icon">${isC?'✓':ICONS[i]}</div>${a}</div>`;
    });
    answersHtml += '</div>';
  } else {
    answersHtml = `<div style="background:rgba(48,209,88,0.1);border:2px solid #30d158;border-radius:11px;padding:18px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:28px;color:#30d158;width:100%;max-width:680px;">Answer: ${q.answer}</div>`;
  }

  var playerList = Object.values(players).sort(function(a,b){return (b.score||0)-(a.score||0);});
  var listHtml = playerList.slice(0,6).map(function(p,i){
    return `<div class="r-row">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--vl-gray);width:24px;">${i<3?['🥇','🥈','🥉'][i]:'#'+(i+1)}</div>
      ${p.photoURL?'<img src="'+p.photoURL+'" width="28" height="28" style="border-radius:50%;object-fit:cover;" alt=""/>':'<div style="width:28px;height:28px;border-radius:50%;background:var(--vl-blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;">'+(p.name||'P')[0]+'</div>'}
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;flex:1;">${p.name||'Player'}</span>
      ${p.lastCorrect?'<span style="font-family:\'Barlow Condensed\',sans-serif;font-size:11px;color:#30d158;margin-right:6px;">+'+p.lastPts+'</span>':''}
      <span style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--vl-cyan);">${p.score||0}</span>
    </div>`;
  }).join('');

  document.getElementById('host-content').innerHTML = `
    <div class="results-wrap">
      <div class="results-h">Answer Revealed</div>
      ${answersHtml}
      <div class="field-label" style="align-self:flex-start;">Scoreboard</div>
      <div class="results-list">${listHtml}</div>
    </div>
  `;
}

// ===== END / PODIUM =====
function endGame() {
  gamePhase = 'podium';
  clearInterval(timerInterval);

  firebase.firestore().collection('classrooms').doc(selectedRoom.code)
    .collection('gamehost').doc('session').update({ status: 'ended' });

  var sorted = Object.values(players).sort(function(a,b){return (b.score||0)-(a.score||0);});
  document.getElementById('topbar-actions').innerHTML =
    '<button class="btn-primary" onclick="resetGame()">End Game</button>';

  var order  = [1,0,2];
  var pbClass= ['pb-2','pb-1','pb-3'];
  var medals = ['🥈','🥇','🥉'];
  var sizes  = [56,72,46];

  var stageHtml = '';
  order.forEach(function(rank,col){
    var p = sorted[rank];
    if (!p) return;
    stageHtml += `<div class="podium-block">
      ${p.photoURL?`<img src="${p.photoURL}" width="${sizes[col]}" height="${sizes[col]}" style="border-radius:50%;object-fit:cover;border:3px solid ${['#c0c0c0','#ffd700','#cd7f32'][col]};" alt=""/>`:
        `<div style="width:${sizes[col]}px;height:${sizes[col]}px;border-radius:50%;background:var(--vl-blue);display:flex;align-items:center;justify-content:center;font-size:${sizes[col]*0.33}px;font-weight:700;color:#fff;">${(p.name||'P')[0]}</div>`}
      <div class="podium-name">${p.name||'Player'}</div>
      <div class="podium-pts">${p.score||0} pts</div>
      <div class="podium-bar ${pbClass[col]}">${medals[col]}</div>
    </div>`;
  });

  var restHtml = sorted.slice(3).map(function(p,i){
    return `<div class="r-row">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--vl-gray);width:24px;">#${i+4}</div>
      ${p.photoURL?'<img src="'+p.photoURL+'" width="26" height="26" style="border-radius:50%;object-fit:cover;" alt=""/>':'<div style="width:26px;height:26px;border-radius:50%;background:var(--vl-blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;">'+(p.name||'P')[0]+'</div>'}
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;flex:1;">${p.name||'Player'}</span>
      <span style="font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--vl-cyan);">${p.score||0}</span>
    </div>`;
  }).join('');

  document.getElementById('host-content').innerHTML = `
    <div class="podium-wrap-outer">
      <div class="podium-title">🏆 Game Over!</div>
      <div class="podium-stage">${stageHtml}</div>
      ${restHtml?`<div class="podium-rest">${restHtml}</div>`:''}
    </div>
  `;
}

function resetGame() {
  if (unsubGame){unsubGame();unsubGame=null;}
  if (selectedRoom) {
    firebase.firestore().collection('classrooms').doc(selectedRoom.code)
      .collection('gamehost').doc('session').delete();
  }
  questions=[]; players={}; gamePhase='setup'; currentQIdx=0;
  document.getElementById('q-sidebar').classList.remove('hidden');
  document.getElementById('live-scores-panel').classList.add('hidden');
  document.getElementById('live-scores-panel').innerHTML='';
  document.getElementById('topbar-actions').innerHTML='';
  document.getElementById('topbar-code').style.display='none';
  document.getElementById('topbar-players').textContent='';
  checkStartBtn();
  renderSetup();
  showToast('Game ended','success');
}

function showToast(msg,type){type=type||'';var c=document.getElementById('toast-container');if(!c)return;var t=document.createElement('div');t.className='toast '+type;t.textContent=msg;c.appendChild(t);setTimeout(function(){t.remove();},3200);}
</script>
