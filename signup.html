<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — V:L</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
</head>
<body>
  <div id="login-screen">
    <div class="login-card">
      <div class="login-header">
        <img class="login-logo" src="https://api.sherbert.cimpress.io/v2/assets/F5zyE9WKTEwyS-YQF3fkZ~200?signature=7f0e12c6a8f73ddad968a67bc734a472c8876d74" alt="V:L"/>
        <div class="login-title">Create Account</div>
      </div>
      <div class="login-body">

        <button class="login-oauth-btn" id="google-signup-btn">
          <svg class="google-svg" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign up with Google
        </button>

        <div class="login-divider"><span>or</span></div>

        <div class="login-field">
          <label>Display Name</label>
          <input type="text" id="signup-name" placeholder="Your name"/>
        </div>
        <div class="login-field">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@school.edu"/>
        </div>
        <div class="login-field">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="At least 6 characters"/>
        </div>
        <div class="login-field">
          <label>Confirm Password</label>
          <input type="password" id="signup-confirm" placeholder="••••••••"/>
        </div>

        <div class="login-field">
          <label>I am a...</label>
          <div class="role-selector">
            <button class="role-btn active" data-role="student">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
              Student
            </button>
            <button class="role-btn" data-role="teacher">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
              Representative
            </button>
          </div>
        </div>

        <button class="login-submit" id="signup-btn">Create Account</button>
        <div class="login-rep-link">Already have an account? <a href="login.html">Sign in</a></div>
      </div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="app.js"></script>
  <script>
    var selectedRole = 'student';

    document.querySelectorAll('.role-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.role-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        selectedRole = btn.getAttribute('data-role');
      });
    });

    document.getElementById('google-signup-btn').addEventListener('click', function() {
      var provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      firebase.auth().signInWithPopup(provider).then(function(result) {
        return firebase.firestore().collection('users').doc(result.user.uid).set({
          name: result.user.displayName,
          email: result.user.email,
          photoURL: result.user.photoURL,
          role: selectedRole,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
      }).then(function() {
        window.location.href = selectedRole === 'teacher' ? 'teacher-home.html' : 'student-home.html';
      }).catch(function(e) { showToast(e.message, 'error'); });
    });

    document.getElementById('signup-btn').addEventListener('click', function() {
      var name    = document.getElementById('signup-name').value.trim();
      var email   = document.getElementById('signup-email').value.trim();
      var pass    = document.getElementById('signup-password').value;
      var confirm = document.getElementById('signup-confirm').value;
      if (!name||!email||!pass||!confirm) return showToast('Fill in all fields','error');
      if (pass.length < 6) return showToast('Password must be 6+ characters','error');
      if (pass !== confirm) return showToast('Passwords do not match','error');
      firebase.auth().createUserWithEmailAndPassword(email, pass).then(function(result) {
        return Promise.all([
          result.user.updateProfile({ displayName: name }),
          firebase.firestore().collection('users').doc(result.user.uid).set({
            name: name, email: email, role: selectedRole,
            photoURL: null,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          })
        ]);
      }).then(function() {
        window.location.href = selectedRole === 'teacher' ? 'teacher-home.html' : 'student-home.html';
      }).catch(function(e) { showToast(e.message,'error'); });
    });
  </script>
</body>
</html>
