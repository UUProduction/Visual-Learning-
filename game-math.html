<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Math Challenge — V:L</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <style>
    body{background:#fff;color:#111;}body::after{display:none;}
    #game-wrap{display:flex;flex-direction:column;align-items:center;min-height:100vh;background:#fff;padding-bottom:40px;}
    .game-topbar{width:100%;background:#0f9d58;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:2px solid #0a7a40;}
    .game-topbar-brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.1em;color:#fff;}
    .game-topbar-brand span{color:#a8ffcc;}
    .topbar-back{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.18);border:none;border-radius:6px;padding:7px 14px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:background 0.2s;}
    .topbar-back:hover{background:rgba(255,255,255,0.28);}
    .topbar-back svg{width:14px;height:14px;stroke:#fff;}

    .game-hud{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:700px;padding:14px 20px 4px;gap:8px;}
    .hud-col{display:flex;flex-direction:column;align-items:center;}
    .hud-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#666;}
    .hud-val{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;color:#111;}
    .hud-val.green{color:#0f9d58;}
    .hud-val.gold{color:#f29900;}
    .hud-val.blue{color:#0a84ff;}

    .rank-badge{display:flex;flex-direction:column;align-items:center;gap:1px;}
    .rank-letter{font-family:'Bebas Neue',sans-serif;font-size:44px;line-height:1;transition:color 0.4s;}
    .rank-name{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#888;text-align:center;}

    .area-badge{width:calc(100% - 40px);max-width:660px;background:linear-gradient(90deg,rgba(15,157,88,0.1),rgba(15,157,88,0.05));border:1px solid rgba(15,157,88,0.25);border-radius:10px;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;margin:8px 0;}
    .area-badge-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.08em;color:#0f9d58;}
    .area-badge-sub{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:0.1em;color:#888;}
    .area-badge-pts{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:#888;}

    .boost-banner{width:calc(100% - 40px);max-width:660px;background:linear-gradient(90deg,rgba(255,215,0,0.12),rgba(255,159,10,0.12));border:1px solid rgba(255,215,0,0.3);border-radius:8px;padding:6px 14px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.1em;color:#f29900;margin-bottom:4px;}

    .math-card{width:calc(100% - 40px);max-width:660px;background:#f8fff9;border:2px solid #c3e6cc;border-radius:16px;padding:24px;text-align:center;box-shadow:0 4px 24px rgba(15,157,88,0.08);}
    .math-category{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#888;margin-bottom:6px;}
    .math-question{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,8vw,72px);color:#111;letter-spacing:0.04em;margin-bottom:20px;line-height:1.1;}
    .math-timer-bar{width:100%;height:6px;background:#e0e0e0;border-radius:3px;margin-bottom:20px;overflow:hidden;}
    .math-timer-fill{height:100%;background:#0f9d58;border-radius:3px;transition:width 0.1s linear;width:100%;}
    .math-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .math-choice-btn{padding:14px 10px;background:#fff;border:2px solid #c3e6cc;border-radius:10px;color:#111;font-family:'Bebas Neue',sans-serif;font-size:26px;cursor:pointer;transition:background 0.15s,border-color 0.15s,transform 0.1s;}
    .math-choice-btn:hover:not(:disabled){background:#e6f9ee;border-color:#0f9d58;transform:scale(1.03);}
    .math-choice-btn.correct{background:#e6f9ee;border-color:#0f9d58;color:#0a7a30;}
    .math-choice-btn.wrong{background:#fef0ef;border-color:#ff3b30;color:#c0120a;}
    .math-choice-btn:disabled{cursor:not-allowed;}
    .math-feedback{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.08em;min-height:22px;margin-top:10px;text-align:center;}
    .math-feedback.correct{color:#0a7a30;}
    .math-feedback.wrong{color:#c0120a;}

    .rank-up-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:800;gap:12px;opacity:0;pointer-events:none;transition:opacity 0.6s;}
    .rank-up-overlay.show{opacity:1;pointer-events:all;}
    .rank-up-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,9vw,80px);letter-spacing:0.08em;animation:vl-pulse 2s infinite;}
    .rank-up-sub{font-family:'Barlow Condensed',sans-serif;font-size:18px;letter-spacing:0.25em;text-transform:uppercase;color:#8899bb;}
    .rank-up-btn{margin-top:14px;padding:11px 28px;background:#0f9d58;border:none;border-radius:8px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;}
    @keyframes vl-pulse{0%,100%{text-shadow:0 0 60px currentColor;}50%{text-shadow:0 0 120px currentColor;}}

    #toast-container{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:9000;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;}
    .toast{background:#323232;border-radius:8px;padding:9px 20px;font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:0.08em;color:#fff;white-space:nowrap;animation:toast-in 0.25s ease,toast-out 0.25s ease 2.75s forwards;}
    .toast.error{background:#b31412;}
    .toast.success{background:#137333;}
    @keyframes toast-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes toast-out{to{opacity:0;transform:translateY(-7px);}}
    @keyframes screen-shake{0%{transform:translate(0,0);}20%{transform:translate(-7px,3px);}40%{transform:translate(7px,-3px);}60%{transform:translate(-3px,7px);}80%{transform:translate(3px,-2px);}100%{transform:translate(0,0);}}
    .shake{animation:screen-shake 0.12s ease;}
  </style>
</head>
<body>
<div id="game-wrap">

  <div class="game-topbar">
    <div class="game-topbar-brand">V<span>:</span>L <span style="font-size:16px;opacity:0.85;">MATH</span></div>
    <a id="back-btn" href="student-home.html" class="topbar-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
  </div>

  <div class="game-hud">
    <div class="hud-col">
      <div class="hud-label">Points</div>
      <div class="hud-val blue" id="hud-pts">0</div>
    </div>
    <div class="rank-badge">
      <div class="rank-letter" id="rank-letter" style="color:#0f9d58;">BM</div>
      <div class="rank-name" id="rank-name">Basic Mather</div>
    </div>
    <div class="hud-col">
      <div class="hud-label">Multiplier</div>
      <div class="hud-val gold" id="hud-mult">x1.00</div>
    </div>
  </div>

  <div class="area-badge">
    <div>
      <div class="area-badge-name" id="area-name">Basic Mather</div>
      <div class="area-badge-sub" id="area-sub">Addition Area</div>
    </div>
    <div class="area-badge-pts" id="area-pts">0 / 4,000 pts</div>
  </div>

  <div class="boost-banner hidden" id="boost-banner"></div>

  <div class="math-card">
    <div class="math-category" id="math-category">Addition</div>
    <div class="math-question" id="math-question">Loading...</div>
    <div class="math-timer-bar"><div class="math-timer-fill" id="timer-fill"></div></div>
    <div class="math-choices" id="math-choices"></div>
    <div class="math-feedback" id="math-feedback"></div>
  </div>

</div>

<!-- RANK UP OVERLAY -->
<div class="rank-up-overlay" id="rankup-overlay">
  <div class="rank-up-title" id="rankup-title">RANK UP</div>
  <div class="rank-up-sub" id="rankup-sub">New Area Unlocked</div>
  <button class="rank-up-btn" onclick="document.getElementById('rankup-overlay').classList.remove('show')">Continue</button>
</div>

<div id="toast-container"></div>
<script src="app.js"></script>
<script>

// ===== MATH RANKS =====
var MATH_RANKS = [
  { id:'BM',  label:'BM',  name:'Basic Mather',   area:'Addition Area',                  minPts:0,          next:4000,       color:'#0f9d58' },
  { id:'L',   label:'L',   name:'Learner',         area:'Subtraction Area',               minPts:4000,       next:10000,      color:'#1a73e8' },
  { id:'D',   label:'D',   name:'Divisor',         area:'Division Area',                  minPts:10000,      next:45000,      color:'#0a84ff' },
  { id:'TM',  label:'TM',  name:'The Multiplier',  area:'Multiplication Area',            minPts:45000,      next:150000,     color:'#ff9f0a' },
  { id:'P',   label:'P',   name:'Power',           area:'Powers Area',                    minPts:150000,     next:1500000,    color:'#ff3b30' },
  { id:'F',   label:'F',   name:'Fractioner',      area:'Fractions & Decimals',           minPts:1500000,    next:500000000,  color:'#bf5af2' },
  { id:'VL',  label:'VL',  name:'Visual Learner',  area:'All Combined — Extreme',         minPts:500000000,  next:40000000000,color:'#ffd700' },
  { id:'LAK', label:'LAK', name:'Lakaydened',       area:'Impossible Mode',               minPts:40000000000,next:Infinity,   color:'#ff375f' }
];

var state = { points:0, mult:1.0, boostMult:1.0, streak:0, perfect:0, qStart:0 };
var currentQ = null;
var timerInterval = null;
var lastRankId = 'BM';
var TIME_LIMIT = 20000;

function getMathRank(pts) {
  var r = MATH_RANKS[0];
  for (var i = 0; i < MATH_RANKS.length; i++) { if (pts >= MATH_RANKS[i].minPts) r = MATH_RANKS[i]; }
  return r;
}

function updateHUD() {
  var rank = getMathRank(state.points);
  document.getElementById('hud-pts').textContent = state.points.toLocaleString();
  document.getElementById('hud-mult').textContent = 'x' + (state.mult * state.boostMult).toFixed(2);
  document.getElementById('rank-letter').textContent = rank.label;
  document.getElementById('rank-letter').style.color = rank.color;
  document.getElementById('rank-name').textContent = rank.name;
  document.getElementById('area-name').textContent = rank.name;
  document.getElementById('area-sub').textContent = rank.area;
  document.getElementById('area-pts').textContent = state.points.toLocaleString() + ' / ' + (rank.next===Infinity?'MAX':rank.next.toLocaleString()) + ' pts';

  var boostBanner = document.getElementById('boost-banner');
  if (state.boostMult > 1) {
    boostBanner.classList.remove('hidden');
    boostBanner.textContent = '🔥 '+state.perfect+' Perfect Streak — '+state.boostMult.toFixed(2)+'x Boost Active!';
  } else {
    boostBanner.classList.add('hidden');
  }

  // Rank up detection
  if (rank.id !== lastRankId) {
    lastRankId = rank.id;
    var overlay = document.getElementById('rankup-overlay');
    var title = document.getElementById('rankup-title');
    var sub = document.getElementById('rankup-sub');
    title.textContent = rank.name.toUpperCase();
    title.style.color = rank.color;
    sub.textContent = rank.area + ' Unlocked!';
    overlay.classList.add('show');
  }
}

function randInt(min, max) { return Math.floor(Math.random()*(max-min+1))+min; }
function randFloat(min, max, dec) { return parseFloat((Math.random()*(max-min)+min).toFixed(dec)); }

function generateQuestion() {
  var rank = getMathRank(state.points);
  var cat, a, b, answer, question;

  if (rank.id === 'BM') {
    // Addition — grows with points
    var max = Math.min(10 + Math.floor(state.points/200), 999);
    a=randInt(1,max); b=randInt(1,max);
    answer=a+b; question=a+' + '+b+' = ?'; cat='Addition';

  } else if (rank.id === 'L') {
    a=randInt(50,9999); b=randInt(1,a);
    answer=a-b; question=a+' − '+b+' = ?'; cat='Subtraction';

  } else if (rank.id === 'D') {
    b=randInt(2,50); answer=randInt(2,100); a=b*answer;
    question=a+' ÷ '+b+' = ?'; cat='Division';

  } else if (rank.id === 'TM') {
    a=randInt(12,999); b=randInt(12,999);
    answer=a*b; question=a+' × '+b+' = ?'; cat='Multiplication';

  } else if (rank.id === 'P') {
    a=randInt(2,20); b=randInt(2,8);
    answer=Math.pow(a,b); question=a+' ^ '+b+' = ?'; cat='Powers';

  } else if (rank.id === 'F') {
    // Fractions and decimals
    if (Math.random()<0.5) {
      var n1=randInt(1,9),d1=randInt(2,9),n2=randInt(1,9),d2=randInt(2,9);
      var numAnswer=n1*d2+n2*d1, denAnswer=d1*d2;
      var g=gcd(numAnswer,denAnswer); numAnswer/=g; denAnswer/=g;
      question='('+n1+'/'+d1+') + ('+n2+'/'+d2+') = ?';
      answer = denAnswer===1 ? numAnswer : numAnswer+'/'+denAnswer;
      cat='Fractions';
    } else {
      a=randFloat(1,99,1); b=randFloat(1,99,1);
      answer=parseFloat((a+b).toFixed(2)); question=a+' + '+b+' = ?'; cat='Decimals';
    }

  } else if (rank.id === 'VL') {
    // Mixed hard
    var types=['add','sub','mul','div','pow','frac'];
    var t=types[randInt(0,types.length-1)];
    if(t==='add'){a=randInt(10000,9999999);b=randInt(10000,9999999);answer=a+b;question=a.toLocaleString()+' + '+b.toLocaleString()+' = ?';cat='Hard Addition';}
    else if(t==='sub'){a=randInt(100000,9999999);b=randInt(1,a);answer=a-b;question=a.toLocaleString()+' − '+b.toLocaleString()+' = ?';cat='Hard Subtraction';}
    else if(t==='mul'){a=randInt(999,9999);b=randInt(999,9999);answer=a*b;question=a.toLocaleString()+' × '+b.toLocaleString()+' = ?';cat='Hard Multiplication';}
    else if(t==='div'){b=randInt(100,9999);answer=randInt(100,9999);a=b*answer;question=a.toLocaleString()+' ÷ '+b.toLocaleString()+' = ?';cat='Hard Division';}
    else if(t==='pow'){a=randInt(10,99);b=randInt(3,6);answer=Math.pow(a,b);question=a+' ^ '+b+' = ?';cat='Hard Powers';}
    else{var n1=randInt(1,19),d1=randInt(2,19),n2=randInt(1,19),d2=randInt(2,19);var num=n1*d2+n2*d1,den=d1*d2;var g=gcd(num,den);num/=g;den/=g;question='('+n1+'/'+d1+') + ('+n2+'/'+d2+') = ?';answer=den===1?num:num+'/'+den;cat='Hard Fractions';}

  } else {
    // Lakaydened — impossible
    a=randInt(999999,999999999); b=randInt(999999,999999999);
    var ops=['+','-','×'];
    var op=ops[randInt(0,2)];
    if(op==='+'){answer=a+b;}else if(op==='-'){if(a<b){var t=a;a=b;b=t;}answer=a-b;}else{answer=a*b;}
    question=a.toLocaleString()+' '+op+' '+b.toLocaleString()+' = ?'; cat='LAKAYDENED';
  }

  // Build wrong answers
  var choices=[answer];
  var ansStr = answer.toString();
  while(choices.length<4){
    var wrong;
    if(typeof answer==='number'){
      var offset=randInt(1,Math.max(3,Math.floor(Math.abs(answer)*0.15)||1));
      wrong=answer+(Math.random()>0.5?offset:-offset);
      if(wrong===answer||wrong<=0) continue;
    } else {
      // fraction answer — generate random fraction
      var wn=randInt(1,20),wd=randInt(2,20);var wg=gcd(wn,wd);wn/=wg;wd/=wg;
      wrong=wd===1?wn:wn+'/'+wd;
    }
    if(choices.indexOf(wrong)===-1) choices.push(wrong);
  }
  choices.sort(function(){return Math.random()-0.5;});
  return {question:question, answer:answer, choices:choices, category:cat};
}

function gcd(a,b){ return b===0?a:gcd(b,a%b); }

function nextQuestion(){
  clearTimerBar();
  document.getElementById('math-feedback').textContent='';
  document.getElementById('math-feedback').className='math-feedback';
  currentQ=generateQuestion();
  document.getElementById('math-category').textContent=currentQ.category;
  document.getElementById('math-question').textContent=currentQ.question;
  var choicesEl=document.getElementById('math-choices'); choicesEl.innerHTML='';
  currentQ.choices.forEach(function(choice,i){
    var btn=document.createElement('button'); btn.className='math-choice-btn';
    btn.setAttribute('data-choice',choice.toString()); btn.textContent=choice;
    btn.addEventListener('click',function(){handleAnswer(choice,btn);});
    choicesEl.appendChild(btn);
  });
  state.qStart=Date.now();
  startTimerBar();
  updateHUD();
}

function startTimerBar(){
  var fill=document.getElementById('timer-fill');
  var start=Date.now();
  fill.style.width='100%'; fill.style.background='#0f9d58';
  timerInterval=setInterval(function(){
    var pct=Math.max(0,100-((Date.now()-start)/TIME_LIMIT*100));
    fill.style.width=pct+'%';
    if(pct<25) fill.style.background='#ff3b30';
    else if(pct<50) fill.style.background='#f29900';
    if(pct<=0){clearInterval(timerInterval);timeOut();}
  },100);
}

function clearTimerBar(){
  clearInterval(timerInterval);
  var fill=document.getElementById('timer-fill');
  fill.style.width='100%'; fill.style.background='#0f9d58';
}

function timeOut(){
  document.querySelectorAll('.math-choice-btn').forEach(function(b){
    b.disabled=true;
    if(b.getAttribute('data-choice')===currentQ.answer.toString()) b.classList.add('correct');
  });
  state.streak=0;
  document.getElementById('math-feedback').textContent="Time's up! Answer: "+currentQ.answer;
  document.getElementById('math-feedback').className='math-feedback wrong';
  updateHUD(); setTimeout(nextQuestion,2000);
}

function handleAnswer(chosen,btn){
  clearTimerBar();
  var isCorrect = chosen.toString()===currentQ.answer.toString();
  document.querySelectorAll('.math-choice-btn').forEach(function(b){
    b.disabled=true;
    if(b.getAttribute('data-choice')===currentQ.answer.toString()) b.classList.add('correct');
  });

  var pts = Math.round(500 * state.boostMult);
  if(!isCorrect){
    btn.classList.add('wrong'); state.streak=0;
    document.getElementById('math-feedback').textContent='Wrong! Answer: '+currentQ.answer;
    document.getElementById('math-feedback').className='math-feedback wrong';
  } else {
    btn.classList.add('correct');
    state.streak++; state.perfect++; state.points+=pts;
    // Every 5 perfect — 1.15x boost (capped at 100x)
    if(state.perfect%5===0){
      state.boostMult=Math.min(100, parseFloat((state.boostMult*1.15).toFixed(4)));
      showToast('🔥 '+state.perfect+' perfect! Boost: '+state.boostMult.toFixed(2)+'x','success');
    }
    document.getElementById('math-feedback').textContent='Correct! +'+pts+' pts'+(state.streak>=3?' 🔥 '+state.streak+' streak!':'');
    document.getElementById('math-feedback').className='math-feedback correct';
    document.body.classList.add('shake');
    setTimeout(function(){document.body.classList.remove('shake');},150);
    saveStats();
  }
  updateHUD(); setTimeout(nextQuestion,1700);
}

document.addEventListener('keydown',function(e){
  var keys={'1':0,'2':1,'3':2,'4':3};
  if(keys[e.key]!==undefined){
    var btns=document.querySelectorAll('.math-choice-btn:not(:disabled)');
    if(btns[keys[e.key]]) btns[keys[e.key]].click();
  }
});

function saveStats(){
  var user=firebase.auth().currentUser; if(!user) return;
  firebase.firestore().collection('users').doc(user.uid).update({
    mathPoints: firebase.firestore.FieldValue.increment(Math.round(500*state.boostMult)),
    mathAnswered: firebase.firestore.FieldValue.increment(1)
  }).catch(function(){});
}

function showToast(msg,type){
  type=type||'';
  var c=document.getElementById('toast-container'); if(!c) return;
  var t=document.createElement('div'); t.className='toast '+type; t.textContent=msg;
  c.appendChild(t); setTimeout(function(){t.remove();},3200);
}

firebase.auth().onAuthStateChanged(function(user){
  if(!user) return window.location.href='login.html';
  firebase.firestore().collection('users').doc(user.uid).get().then(function(doc){
    var backBtn=document.getElementById('back-btn');
    if(doc.exists){
      var role=doc.data().role;
      if(role==='admin') backBtn.href='admin-home.html';
      else if(role==='teacher') backBtn.href='teacher-home.html';
      else backBtn.href='student-home.html';
    }
  });
  nextQuestion();
});
</script>
</body>
</html>
