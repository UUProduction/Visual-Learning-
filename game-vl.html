<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visual: Learning — V:L</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <style>
    body { background:#fff; color:#111; }
    body::after { display:none; }

    /* ===== LOADING SCREEN ===== */
    #game-loading {
      position:fixed; inset:0;
      background:#050a14;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:28px; z-index:999;
      transition:opacity 0.6s ease;
    }

    .game-loading-brand {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(48px,10vw,90px);
      letter-spacing:0.08em; color:#e8f0ff;
      text-shadow:0 0 30px rgba(0,229,255,0.4);
      line-height:1;
    }
    .game-loading-brand span { color:#00e5ff; }

    .gc-spinner {
      width:52px; height:52px;
      border:4px solid rgba(10,132,255,0.2);
      border-top-color:#0a84ff;
      border-radius:50%;
      animation:gc-spin 0.9s linear infinite;
    }
    @keyframes gc-spin { to { transform:rotate(360deg); } }

    .game-loading-fact {
      font-family:'Barlow Condensed',sans-serif;
      font-size:15px; letter-spacing:0.06em;
      color:rgba(136,153,187,0.75);
      text-align:center; max-width:300px;
      line-height:1.6; min-height:48px;
      transition:opacity 0.4s ease;
    }

    /* ===== INTRO CREDITS ===== */
    #intro-overlay {
      position:fixed; inset:0;
      background:#050a14;
      display:none; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:500; gap:6px;
      transition:opacity 0.7s ease;
    }

    .intro-vl-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(52px,12vw,110px);
      letter-spacing:0.08em; color:#e8f0ff;
      text-shadow:0 0 30px rgba(0,229,255,0.4);
      line-height:1;
    }

    .intro-vl-sub {
      font-family:'Barlow Condensed',sans-serif;
      font-size:clamp(14px,3vw,22px);
      letter-spacing:0.4em; color:#00e5ff;
      text-transform:uppercase; margin-top:4px;
    }

    .intro-credits {
      margin-top:22px;
      display:flex; flex-direction:column;
      align-items:center; gap:5px;
    }

    .intro-credit-row {
      font-family:'Barlow Condensed',sans-serif;
      font-size:13px; letter-spacing:0.12em;
      color:rgba(136,153,187,0.65);
      text-align:center; text-transform:uppercase;
    }
    .intro-credit-row span { color:#e8f0ff; font-weight:700; }

    /* ===== TOP BAR ===== */
    .game-topbar {
      width:100%; background:#0a84ff;
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 20px; border-bottom:2px solid #0070e0;
    }

    .game-topbar-brand {
      font-family:'Bebas Neue',sans-serif;
      font-size:22px; letter-spacing:0.1em; color:#fff;
    }
    .game-topbar-brand span { color:#00e5ff; }

    .topbar-back {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(255,255,255,0.18); border:none;
      border-radius:6px; padding:7px 14px; color:#fff;
      font-family:'Barlow Condensed',sans-serif; font-size:13px;
      font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
      cursor:pointer; text-decoration:none; transition:background 0.2s;
    }
    .topbar-back:hover { background:rgba(255,255,255,0.28); }
    .topbar-back svg { width:14px; height:14px; stroke:#fff; flex-shrink:0; }

    /* ===== HUD ===== */
    .game-hud {
      display:flex; align-items:center; justify-content:space-between;
      width:100%; max-width:700px; padding:16px 20px 8px;
    }

    .hud-points { display:flex; flex-direction:column; }
    .hud-pts-label {
      font-family:'Barlow Condensed',sans-serif; font-size:11px;
      font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#666;
    }
    .hud-pts-val {
      font-family:'Bebas Neue',sans-serif; font-size:42px; line-height:1; color:#111;
    }

    .rank-badge { display:flex; flex-direction:column; align-items:center; gap:1px; }
    .rank-letter {
      font-family:'Bebas Neue',sans-serif; font-size:54px;
      line-height:1; transition:color 0.4s, text-shadow 0.4s;
    }
    .rank-name {
      font-family:'Barlow Condensed',sans-serif; font-size:10px;
      letter-spacing:0.2em; text-transform:uppercase; color:#888;
    }

    .hud-multiplier { text-align:right; }
    .hud-mult-label {
      font-family:'Barlow Condensed',sans-serif; font-size:11px;
      font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#666;
    }
    .hud-mult-val {
      font-family:'Bebas Neue',sans-serif; font-size:38px;
      color:#f29900; text-shadow:0 0 10px rgba(242,153,0,0.25);
    }

    /* ===== QUESTION CARD ===== */
    .q-card {
      width:calc(100% - 40px); max-width:620px;
      background:#f8f9fc; border:2px solid #e0e8ff;
      border-radius:16px; padding:28px 24px;
      text-align:center; box-shadow:0 4px 24px rgba(10,132,255,0.08);
    }

    .q-prompt {
      font-family:'Barlow Condensed',sans-serif; font-size:12px;
      letter-spacing:0.22em; text-transform:uppercase; color:#888;
      margin-bottom:8px;
    }

    .q-word {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(42px,8vw,70px);
      color:#111; letter-spacing:0.04em; margin-bottom:24px;
      min-height:72px; display:flex; align-items:center; justify-content:center;
    }

    .q-choices { display:flex; flex-direction:column; gap:10px; }

    .choice-btn {
      width:100%; padding:13px 18px;
      background:#fff; border:2px solid #e0e8ff;
      border-radius:10px; color:#111;
      font-family:'Barlow',sans-serif; font-size:14px;
      text-align:left; cursor:pointer;
      transition:background 0.15s, border-color 0.15s, transform 0.1s;
      box-shadow:0 2px 6px rgba(0,0,0,0.04);
    }
    .choice-btn:hover:not(:disabled) {
      background:#eef3ff; border-color:#0a84ff; transform:translateX(4px);
    }
    .choice-btn.correct { background:#e6f9ee; border-color:#30d158; color:#0a7a30; }
    .choice-btn.wrong   { background:#fef0ef; border-color:#ff3b30; color:#c0120a; }
    .choice-btn:disabled { cursor:not-allowed; }

    /* ===== INLINE CARD SPINNER ===== */
    .q-spinner {
      width:36px; height:36px;
      border:4px solid rgba(10,132,255,0.15);
      border-top-color:#0a84ff;
      border-radius:50%;
      animation:gc-spin 0.9s linear infinite;
      margin:0 auto;
    }

    /* ===== RANK POPUP ===== */
    .rank-popup {
      position:fixed; top:50%; right:20px;
      transform:translateY(-50%) translateX(130%);
      background:#050a14; border-left:4px solid #ffd700;
      border-radius:0 10px 10px 0; padding:14px 18px;
      min-width:210px; z-index:400;
      transition:transform 0.35s cubic-bezier(.17,.67,.3,1.4);
      box-shadow:0 8px 32px rgba(0,0,0,0.35);
    }
    .rank-popup.show { transform:translateY(-50%) translateX(0); }

    .popup-rank-id {
      font-family:'Bebas Neue',sans-serif; font-size:40px;
      line-height:1; letter-spacing:0.05em; color:#fff;
    }
    .popup-bonuses { margin-top:6px; display:flex; flex-direction:column; gap:3px; }
    .popup-bonus {
      font-family:'Barlow Condensed',sans-serif; font-size:11px;
      font-weight:600; letter-spacing:0.1em; color:#00e5ff;
      text-transform:uppercase;
    }
    .popup-bonus::before { content:'+ '; color:#8899bb; }
    .popup-mult-line {
      margin-top:9px; font-family:'Barlow Condensed',sans-serif;
      font-size:11px; color:#8899bb; letter-spacing:0.1em;
    }
    .popup-mult-line strong { color:#ffd700; font-size:17px; }

    /* ===== VL ACHIEVED ===== */
    .vl-achieved {
      position:fixed; inset:0; background:rgba(0,0,0,0.93);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:900; gap:12px;
      opacity:0; pointer-events:none; transition:opacity 0.6s;
    }
    .vl-achieved.show { opacity:1; pointer-events:all; }
    .vl-achieved-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(44px,10vw,90px); color:#bf5af2;
      letter-spacing:0.08em; animation:vl-pulse 2s infinite;
    }
    @keyframes vl-pulse {
      0%,100%{ text-shadow:0 0 60px rgba(191,90,242,0.6); }
      50%{ text-shadow:0 0 120px rgba(191,90,242,0.95); }
    }
    .vl-achieved-sub {
      font-family:'Barlow Condensed',sans-serif; font-size:20px;
      letter-spacing:0.3em; text-transform:uppercase; color:#8899bb;
    }
    .vl-continue-btn {
      margin-top:16px; padding:12px 32px;
      background:#0a84ff; border:none; border-radius:8px; color:#fff;
      font-family:'Barlow Condensed',sans-serif; font-size:15px;
      font-weight:700; letter-spacing:0.15em; text-transform:uppercase;
      cursor:pointer; transition:background 0.2s;
    }
    .vl-continue-btn:hover { background:#2a94ff; }

    /* ===== KEYBOARD HINT ===== */
    .keyboard-wrap {
      position:fixed; bottom:16px; left:16px;
      width:200px; opacity:0.55;
      transition:opacity 0.2s; z-index:10;
    }
    .keyboard-wrap:hover { opacity:1; }
    .keyboard-wrap img { width:100%; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,0.15); }
    .keyboard-label {
      font-family:'Barlow Condensed',sans-serif; font-size:10px;
      font-weight:600; letter-spacing:0.15em; text-transform:uppercase;
      color:#888; text-align:center; margin-top:4px;
    }

    /* ===== GAME WRAP ===== */
    #game-wrap {
      display:none; flex-direction:column;
      align-items:center; min-height:100vh;
      background:#fff; padding-bottom:30px;
    }

    /* ===== TOAST ===== */
    #toast-container {
      position:fixed; bottom:22px; left:50%;
      transform:translateX(-50%); z-index:9000;
      display:flex; flex-direction:column;
      gap:6px; align-items:center; pointer-events:none;
    }
    .toast {
      background:#323232; border-radius:8px; padding:9px 20px;
      font-family:'Barlow Condensed',sans-serif; font-size:13px;
      letter-spacing:0.08em; color:#fff; white-space:nowrap;
      box-shadow:0 4px 16px rgba(0,0,0,0.2);
      animation:toast-in 0.25s ease, toast-out 0.25s ease 2.75s forwards;
    }
    .toast.error   { background:#b31412; }
    .toast.success { background:#137333; }
    @keyframes toast-in  { from{opacity:0;transform:translateY(10px);}  to{opacity:1;transform:translateY(0);} }
    @keyframes toast-out { to{opacity:0;transform:translateY(-7px);} }

    @keyframes screen-shake {
      0%  {transform:translate(0,0);}
      20% {transform:translate(-7px,3px);}
      40% {transform:translate(7px,-3px);}
      60% {transform:translate(-3px,7px);}
      80% {transform:translate(3px,-2px);}
      100%{transform:translate(0,0);}
    }
    .shake { animation:screen-shake 0.12s ease; }
  </style>
</head>

</div>

<!-- ===== VL ACHIEVED ===== -->

  <div class="vl-achieved-sub">Rank Achieved</div>

</div>

<script src="app.js"></script>
<script>

// ===== FACTS =====
var FACTS = [
  'Did you know Skylar is short? 😭',
  'Don Don thinks he made this but in truth Lakayden did 🤣'
];
var factIndex = Math.floor(Math.random() * FACTS.length);
var factEl = document.getElementById('loading-fact');
factEl.textContent = FACTS[factIndex];

setInterval(function() {
  factEl.style.opacity = '0';
  setTimeout(function() {
    factIndex = (factIndex + 1) % FACTS.length;
    factEl.textContent = FACTS[factIndex];
    factEl.style.opacity = '1';
  }, 400);
}, 3500);

// ===== RANKS =====
var RANKS = [
  { id:'D',  label:'D',              minPts:0,   minMult:0,   color:'#888888' },
  { id:'C',  label:'C',              minPts:50,  minMult:1.0, color:'#30d158' },
  { id:'B',  label:'B',              minPts:100, minMult:1.5, color:'#0a84ff' },
  { id:'A',  label:'A',              minPts:175, minMult:2.0, color:'#ff9f0a' },
  { id:'S',  label:'S',              minPts:250, minMult:2.5, color:'#ff3b30' },
  { id:'SS', label:'SS',             minPts:350, minMult:3.0, color:'#ff375f' },
  { id:'SSS',label:'SSS',            minPts:450, minMult:4.0, color:'#ffd700' },
  { id:'VL', label:'VISUAL LEARNER', minPts:450, minMult:4.5, color:'#bf5af2' }
];

var state = { points:0, mult:1.0, streak:0, qStart:0, correct:'' };
var vlAchieved = false;
var popupTimer = null;

function getRank(pts, mult) {
  var r = RANKS[0];
  for (var i = 0; i < RANKS.length; i++) {
    if (pts >= RANKS[i].minPts && mult >= RANKS[i].minMult) r = RANKS[i];
  }
  return r;
}

function calcMult(streak, ms) {
  var m = 1.0 + streak * 0.15;
  if (ms < 3000) m += 0.5;
  else if (ms < 5000) m += 0.25;
  return Math.min(parseFloat(m.toFixed(2)), 9.99);
}

function getBonuses(streak, ms) {
  var b = [];
  if (ms < 2000) b.push('AIRSHOT');
  if (streak === 3) b.push('TRIPLE STREAK');
  if (streak === 5) b.push('QUINTUPLE STREAK');
  if (streak >= 2 && ms < 3000) b.push('RICOSHOT');
  return b;
}

// ===== SEQUENCE: loading → intro → game =====
function startSequence() {
  var loading = document.getElementById('game-loading');
  var intro   = document.getElementById('intro-overlay');
  var game    = document.getElementById('game-wrap');

  // Step 1: hide loading screen after 2s
  setTimeout(function() {
    loading.style.opacity = '0';
    setTimeout(function() {
      loading.style.display = 'none';

      // Step 2: show intro credits
      intro.style.display = 'flex';
      intro.style.opacity = '0';
      setTimeout(function() {
        intro.style.opacity = '1';
      }, 30);

      // Step 3: after 3s hide intro, show game
      setTimeout(function() {
        intro.style.opacity = '0';
        setTimeout(function() {
          intro.style.display = 'none';
          game.style.display = 'flex';
          loadQuestion();
        }, 700);
      }, 3000);

    }, 600);
  }, 2000);
}

// ===== LOAD QUESTION =====
async function loadQuestion() {
  document.getElementById('q-word').innerHTML = '<div class="q-spinner"></div>';
  document.getElementById('q-choices').innerHTML = '';

  try {
    var res = await fetch('/api/question', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({})
    });

    // Read as text first to avoid "unexpected end of JSON" crash
    var rawText = await res.text();

    if (!rawText || rawText.trim() === '') {
      throw new Error('Server returned empty response — check Render logs');
    }

    var data;
    try {
      data = JSON.parse(rawText);
    } catch(e) {
      throw new Error('Response not JSON: ' + rawText.substring(0, 80));
    }

    if (!res.ok || data.error) {
      throw new Error(data.error || 'Server error ' + res.status);
    }

    if (!data.content || !data.content[0] || !data.content[0].text) {
      throw new Error('No content in response');
    }

    var text = data.content[0].text.trim();
    text = text.replace(/```json|```/g, '').trim();

    var match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON object in response');

    var parsed;
    try {
      parsed = JSON.parse(match[0]);
    } catch(e) {
      throw new Error('Could not parse question JSON');
    }

    if (!parsed.word || !parsed.correct || !Array.isArray(parsed.choices) || parsed.choices.length < 2) {
      throw new Error('Invalid question format from API');
    }

    state.correct = parsed.correct;
    state.qStart = Date.now();

    document.getElementById('q-word').textContent = parsed.word;

    var choicesEl = document.getElementById('q-choices');
    choicesEl.innerHTML = '';
    parsed.choices.forEach(function(choice, i) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.setAttribute('data-choice', choice);
      btn.innerHTML = '<span style="font-weight:700;color:#0a84ff;margin-right:8px;">'+(i+1)+'</span>'+choice;
      btn.addEventListener('click', function() { handleAnswer(choice, btn); });
      choicesEl.appendChild(btn);
    });

  } catch(e) {
    document.getElementById('q-word').textContent = 'Error';
    showToast('Error: ' + e.message, 'error');
    setTimeout(loadQuestion, 4000);
  }
}

// ===== KEYBOARD 1-4 =====
document.addEventListener('keydown', function(e) {
  var keys = {'1':0,'2':1,'3':2,'4':3};
  if (keys[e.key] !== undefined) {
    var btns = document.querySelectorAll('.choice-btn:not(:disabled)');
    if (btns[keys[e.key]]) btns[keys[e.key]].click();
  }
});

// ===== ANSWER HANDLER =====
function handleAnswer(chosen, btn) {
  var ms = Date.now() - state.qStart;
  var isCorrect = chosen === state.correct;

  document.querySelectorAll('.choice-btn').forEach(function(b) {
    b.disabled = true;
    if (b.getAttribute('data-choice') === state.correct) b.classList.add('correct');
  });

  if (!isCorrect) {
    btn.classList.add('wrong');
    state.streak = 0;
    state.mult = Math.max(1.0, parseFloat((state.mult - 0.25).toFixed(2)));
    showRankPopup(['INTERRUPTION']);
  } else {
    state.streak++;
    state.points++;
    state.mult = calcMult(state.streak, ms);
    showRankPopup(getBonuses(state.streak, ms));
    document.body.classList.add('shake');
    setTimeout(function(){ document.body.classList.remove('shake'); }, 150);
  }

  document.getElementById('hud-pts').textContent = state.points;
  document.getElementById('hud-mult').textContent = 'x' + state.mult.toFixed(2);

  var rank = getRank(state.points, state.mult);
  var rl = document.getElementById('rank-letter');
  rl.textContent = rank.label;
  rl.style.color = rank.color;
  rl.style.textShadow = '0 0 20px ' + rank.color + '66';
  document.getElementById('rank-name').textContent = rank.id === 'VL' ? 'Visual Learner' : rank.id;

  if (rank.id === 'VL' && !vlAchieved) {
    vlAchieved = true;
    setTimeout(function(){ document.getElementById('vl-achieved').classList.add('show'); }, 600);
  }

  saveTournamentScore();
  setTimeout(loadQuestion, 1800);
}

function showRankPopup(bonuses) {
  var rank = getRank(state.points, state.mult);
  var popup = document.getElementById('rank-popup');
  document.getElementById('popup-rank-id').textContent = rank.label;
  document.getElementById('popup-rank-id').style.color = rank.color;
  document.getElementById('popup-mult').textContent = 'x' + state.mult.toFixed(2);
  var bonusEl = document.getElementById('popup-bonuses');
  bonusEl.innerHTML = '';
  bonuses.forEach(function(b) {
    var el = document.createElement('div');
    el.className = 'popup-bonus';
    el.textContent = b;
    bonusEl.appendChild(el);
  });
  popup.classList.add('show');
  if (popupTimer) clearTimeout(popupTimer);
  popupTimer = setTimeout(function(){ popup.classList.remove('show'); }, 2200);
}

// ===== TOURNAMENT SCORE SYNC =====
function saveTournamentScore() {
  var user = firebase.auth().currentUser;
  if (!user) return;
  firebase.firestore().collection('users').doc(user.uid).get().then(function(doc) {
    if (!doc.exists) return;
    var codes = doc.data().classroomCodes || [];
    if (doc.data().classroomCode) codes.push(doc.data().classroomCode);
    codes = [...new Set(codes)];
    codes.forEach(function(code) {
      firebase.firestore().collection('classrooms').doc(code)
        .collection('tournament').doc('lobby').get().then(function(snap) {
          if (!snap.exists || snap.data().status !== 'active') return;
          var upd = {};
          upd['players.' + user.uid + '.points'] = state.points;
          snap.ref.update(upd);
        });
    });
  });
}

// ===== TOAST =====
function showToast(msg, type) {
  type = type || '';
  var c = document.getElementById('toast-container');
  if (!c) return;
  var t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function(){ t.remove(); }, 3200);
}

// ===== INIT =====
firebase.auth().onAuthStateChanged(function(user) {
  if (!user) return window.location.href = 'login.html';
  startSequence();
});
