<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visual: Learning — V:L</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <style>
    body { background:#fff; color:#111; }
    body::after { display:none; }

    #game-loading {
      position:fixed; inset:0; background:#050a14;
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:28px; z-index:999;
      transition:opacity 0.6s ease;
    }
    .game-loading-brand {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(48px,10vw,90px);
      letter-spacing:0.08em; color:#e8f0ff;
      text-shadow:0 0 30px rgba(0,229,255,0.4); line-height:1;
    }
    .game-loading-brand span { color:#00e5ff; }
    .gc-spinner {
      width:52px; height:52px;
      border:4px solid rgba(10,132,255,0.2);
      border-top-color:#0a84ff; border-radius:50%;
      animation:gc-spin 0.9s linear infinite;
    }
    @keyframes gc-spin { to{transform:rotate(360deg);} }
    .game-loading-fact {
      font-family:'Barlow Condensed',sans-serif; font-size:15px;
      letter-spacing:0.06em; color:rgba(136,153,187,0.75);
      text-align:center; max-width:300px; line-height:1.6;
      min-height:48px; transition:opacity 0.4s ease;
    }

    #intro-overlay {
      position:fixed; inset:0; background:#050a14;
      display:none; flex-direction:column; align-items:center;
      justify-content:center; z-index:500; gap:6px;
      transition:opacity 0.7s ease;
    }
    .intro-vl-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(52px,12vw,110px);
      letter-spacing:0.08em; color:#e8f0ff;
      text-shadow:0 0 30px rgba(0,229,255,0.4); line-height:1;
    }
    .intro-vl-sub {
      font-family:'Barlow Condensed',sans-serif;
      font-size:clamp(14px,3vw,22px);
      letter-spacing:0.4em; color:#00e5ff;
      text-transform:uppercase; margin-top:4px;
    }
    .intro-credits { margin-top:22px; display:flex; flex-direction:column; align-items:center; gap:5px; }
    .intro-credit-row {
      font-family:'Barlow Condensed',sans-serif; font-size:13px;
      letter-spacing:0.12em; color:rgba(136,153,187,0.65);
      text-align:center; text-transform:uppercase;
    }
    .intro-credit-row span { color:#e8f0ff; font-weight:700; }

    .game-topbar {
      width:100%; background:#0a84ff;
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 20px; border-bottom:2px solid #0070e0;
    }
    .game-topbar-brand { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:0.1em; color:#fff; }
    .game-topbar-brand span { color:#00e5ff; }
    .topbar-back {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(255,255,255,0.18); border:none; border-radius:6px;
      padding:7px 14px; color:#fff; font-family:'Barlow Condensed',sans-serif;
      font-size:13px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
      cursor:pointer; text-decoration:none; transition:background 0.2s;
    }
    .topbar-back:hover { background:rgba(255,255,255,0.28); }
    .topbar-back svg { width:14px; height:14px; stroke:#fff; flex-shrink:0; }

    .game-hud {
      display:flex; align-items:center; justify-content:space-between;
      width:100%; max-width:700px; padding:14px 20px 6px;
    }
    .hud-col { display:flex; flex-direction:column; align-items:center; }
    .hud-label {
      font-family:'Barlow Condensed',sans-serif; font-size:10px;
      font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#666;
    }
    .hud-val { font-family:'Bebas Neue',sans-serif; font-size:38px; line-height:1; color:#111; }
    .hud-val.gold { color:#f29900; }
    .hud-val.blue { color:#0a84ff; }

    /* BOOST BANNER */
    .boost-banner {
      width:calc(100% - 40px); max-width:700px;
      background:linear-gradient(90deg,rgba(255,215,0,0.15),rgba(255,159,10,0.1));
      border:1px solid rgba(255,215,0,0.35); border-radius:8px;
      padding:7px 14px; text-align:center;
      font-family:'Barlow Condensed',sans-serif; font-size:13px;
      font-weight:700; letter-spacing:0.1em; color:#f29900;
      margin:4px 0 8px;
    }

    /* MODE SWITCHER */
    .mode-switcher { display:flex; gap:8px; margin:8px 0 14px; }
    .mode-btn {
      flex:1; max-width:160px; padding:8px 16px;
      border-radius:20px; font-family:'Barlow Condensed',sans-serif;
      font-size:13px; font-weight:700; letter-spacing:0.1em;
      text-transform:uppercase; cursor:pointer;
      border:2px solid #e0e8ff; background:#fff; color:#888;
      transition:all 0.2s;
    }
    .mode-btn.active { background:#0a84ff; border-color:#0a84ff; color:#fff; }

    /* RANK BADGE */
    .rank-badge { display:flex; flex-direction:column; align-items:center; gap:1px; }
    .rank-letter { font-family:'Bebas Neue',sans-serif; font-size:46px; line-height:1; transition:color 0.4s,text-shadow 0.4s; }
    .rank-name { font-family:'Barlow Condensed',sans-serif; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:#888; text-align:center; max-width:100px; }

    /* CARD */
    .q-card {
      width:calc(100% - 40px); max-width:640px;
      background:#f8f9fc; border:2px solid #e0e8ff;
      border-radius:16px; padding:28px 24px;
      text-align:center; box-shadow:0 4px 24px rgba(10,132,255,0.08);
    }
    .q-word-display {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(38px,7vw,64px);
      color:#0a84ff; letter-spacing:0.06em; margin-bottom:6px; line-height:1;
    }
    .q-pos {
      font-family:'Barlow Condensed',sans-serif; font-size:12px;
      letter-spacing:0.18em; text-transform:uppercase; color:#888; margin-bottom:16px;
    }

    /* TYPING MODE */
    .typing-sentence {
      font-family:'Barlow',sans-serif; font-size:16px;
      line-height:1.8; color:#333; margin-bottom:20px;
      text-align:left; background:#fff; border:1px solid #e0e8ff;
      border-radius:10px; padding:14px 16px;
    }
    .typing-sentence .word-highlight { background:#0a84ff; color:#fff; border-radius:4px; padding:1px 4px; }
    .typing-sentence .word-correct { color:#0a7a30; font-weight:700; }
    .typing-sentence .word-wrong { color:#c0120a; text-decoration:line-through; }

    .type-input-wrap { display:flex; gap:10px; align-items:center; }
    .type-input {
      flex:1; padding:12px 16px; font-family:'Barlow',sans-serif; font-size:16px;
      border:2px solid #e0e8ff; border-radius:10px; outline:none;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .type-input:focus { border-color:#0a84ff; box-shadow:0 0 0 3px rgba(10,132,255,0.12); }
    .type-input.correct-flash { border-color:#30d158; background:#e6f9ee; }
    .type-input.wrong-flash  { border-color:#ff3b30; background:#fef0ef; }
    .type-submit {
      padding:12px 20px; background:#0a84ff; border:none;
      border-radius:10px; color:#fff; font-family:'Barlow Condensed',sans-serif;
      font-size:14px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase;
      cursor:pointer; transition:background 0.2s; white-space:nowrap;
    }
    .type-submit:hover { background:#2a94ff; }
    .type-feedback {
      margin-top:10px; font-family:'Barlow Condensed',sans-serif;
      font-size:13px; font-weight:600; letter-spacing:0.08em;
      min-height:20px; text-align:center;
    }
    .type-feedback.correct { color:#0a7a30; }
    .type-feedback.wrong   { color:#c0120a; }

    .word-progress { display:flex; gap:5px; flex-wrap:wrap; justify-content:center; margin-bottom:16px; }
    .word-pip { width:28px; height:6px; border-radius:3px; background:#e0e8ff; transition:background 0.3s; }
    .word-pip.done-correct { background:#30d158; }
    .word-pip.done-wrong   { background:#ff3b30; }
    .word-pip.current      { background:#0a84ff; }

    /* DESCRIPTION MODE */
    .desc-text {
      font-family:'Barlow',sans-serif; font-size:15px;
      line-height:1.7; color:#333; text-align:left;
      background:#fff; border:1px solid #e0e8ff;
      border-radius:10px; padding:14px 16px; margin-bottom:18px;
    }
    .q-choices { display:flex; flex-direction:column; gap:10px; }
    .choice-btn {
      width:100%; padding:13px 18px; background:#fff;
      border:2px solid #e0e8ff; border-radius:10px; color:#111;
      font-family:'Barlow',sans-serif; font-size:14px;
      text-align:left; cursor:pointer;
      transition:background 0.15s,border-color 0.15s,transform 0.1s;
    }
    .choice-btn:hover:not(:disabled) { background:#eef3ff; border-color:#0a84ff; transform:translateX(4px); }
    .choice-btn.correct { background:#e6f9ee; border-color:#30d158; color:#0a7a30; font-weight:700; }
    .choice-btn.wrong   { background:#fef0ef; border-color:#ff3b30; color:#c0120a; }
    .choice-btn:disabled { cursor:not-allowed; }

    /* SPINNER */
    .q-spinner {
      width:36px; height:36px;
      border:4px solid rgba(10,132,255,0.15);
      border-top-color:#0a84ff; border-radius:50%;
      animation:gc-spin 0.9s linear infinite; margin:20px auto;
    }

    /* RANK POPUP */
    .rank-popup {
      position:fixed; top:50%; right:20px;
      transform:translateY(-50%) translateX(130%);
      background:#050a14; border-left:4px solid #ffd700;
      border-radius:0 10px 10px 0; padding:14px 18px;
      min-width:200px; z-index:400;
      transition:transform 0.35s cubic-bezier(.17,.67,.3,1.4);
      box-shadow:0 8px 32px rgba(0,0,0,0.35);
    }
    .rank-popup.show { transform:translateY(-50%) translateX(0); }
    .popup-rank-id { font-family:'Bebas Neue',sans-serif; font-size:38px; line-height:1; color:#fff; }
    .popup-bonuses { margin-top:6px; display:flex; flex-direction:column; gap:3px; }
    .popup-bonus { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.1em; color:#00e5ff; text-transform:uppercase; }
    .popup-bonus::before { content:'+ '; color:#8899bb; }
    .popup-mult-line { margin-top:8px; font-family:'Barlow Condensed',sans-serif; font-size:11px; color:#8899bb; }
    .popup-mult-line strong { color:#ffd700; font-size:16px; }

    /* VL ACHIEVED */
    .vl-achieved {
      position:fixed; inset:0; background:rgba(0,0,0,0.93);
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; z-index:900; gap:12px;
      opacity:0; pointer-events:none; transition:opacity 0.6s;
    }
    .vl-achieved.show { opacity:1; pointer-events:all; }
    .vl-achieved-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(44px,10vw,90px); color:#bf5af2;
      letter-spacing:0.08em; animation:vl-pulse 2s infinite;
    }
    @keyframes vl-pulse { 0%,100%{text-shadow:0 0 60px rgba(191,90,242,0.6);} 50%{text-shadow:0 0 120px rgba(191,90,242,0.95);} }
    .vl-achieved-sub { font-family:'Barlow Condensed',sans-serif; font-size:20px; letter-spacing:0.3em; text-transform:uppercase; color:#8899bb; }
    .vl-continue-btn { margin-top:16px; padding:12px 32px; background:#0a84ff; border:none; border-radius:8px; color:#fff; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; }
    .vl-continue-btn:hover { background:#2a94ff; }

    .keyboard-wrap { position:fixed; bottom:16px; left:16px; width:190px; opacity:0.5; transition:opacity 0.2s; z-index:10; }
    .keyboard-wrap:hover { opacity:1; }
    .keyboard-wrap img { width:100%; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,0.12); }
    .keyboard-label { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:600; letter-spacing:0.15em; text-transform:uppercase; color:#888; text-align:center; margin-top:4px; }

    #game-wrap { display:none; flex-direction:column; align-items:center; min-height:100vh; background:#fff; padding-bottom:40px; }

    #toast-container { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:9000; display:flex; flex-direction:column; gap:6px; align-items:center; pointer-events:none; }
    .toast { background:#323232; border-radius:8px; padding:9px 20px; font-family:'Barlow Condensed',sans-serif; font-size:13px; letter-spacing:0.08em; color:#fff; white-space:nowrap; animation:toast-in 0.25s ease,toast-out 0.25s ease 2.75s forwards; }
    .toast.error { background:#b31412; }
    .toast.success { background:#137333; }
    @keyframes toast-in  { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
    @keyframes toast-out { to{opacity:0;transform:translateY(-7px);} }
    @keyframes screen-shake { 0%{transform:translate(0,0);} 20%{transform:translate(-7px,3px);} 40%{transform:translate(7px,-3px);} 60%{transform:translate(-3px,7px);} 80%{transform:translate(3px,-2px);} 100%{transform:translate(0,0);} }
    .shake { animation:screen-shake 0.12s ease; }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="game-loading">
  <div class="game-loading-brand">V<span>:</span>L</div>
  <div class="gc-spinner"></div>
  <div class="game-loading-fact" id="loading-fact"></div>
</div>

<!-- INTRO -->
<div id="intro-overlay">
  <div class="intro-vl-title">VISUAL<span style="color:#00e5ff;">:</span></div>
  <div class="intro-vl-title" style="font-size:clamp(32px,7vw,68px);margin-top:-10px;">Learning</div>
  <div class="intro-vl-sub">Vision: Learning</div>
  <div class="intro-credits">
    <div class="intro-credit-row">Created by <span>Lakayden</span></div>
    <div class="intro-credit-row">Developers <span>Kyle.R &nbsp;·&nbsp; Dan.M</span></div>
    <div class="intro-credit-row">Admins / Helpers <span>Chance.H</span></div>
  </div>
</div>

<!-- GAME -->
<div id="game-wrap">
  <div class="game-topbar">
    <div class="game-topbar-brand">V<span>:</span>L</div>
    <a id="back-btn" href="student-home.html" class="topbar-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
  </div>

  <div class="game-hud">
    <div class="hud-col">
      <div class="hud-label">Points</div>
      <div class="hud-val blue" id="hud-pts">0</div>
    </div>
    <div class="rank-badge">
      <div class="rank-letter" id="rank-letter" style="color:#555;">F</div>
      <div class="rank-name" id="rank-name">Unranked</div>
    </div>
    <div class="hud-col">
      <div class="hud-label">Multiplier</div>
      <div class="hud-val gold" id="hud-mult">x1.00</div>
    </div>
  </div>

  <!-- BOOST BANNER -->
  <div class="boost-banner" id="boost-banner" style="display:none;"></div>

  <div class="mode-switcher">
    <button class="mode-btn active" id="btn-typing" onclick="setMode('typing')">⌨️ Typing</button>
    <button class="mode-btn" id="btn-desc" onclick="setMode('description')">📖 Description</button>
  </div>

  <div class="q-card" id="q-card">
    <div class="q-spinner"></div>
  </div>
</div>

<!-- KEYBOARD HINT -->
<div class="keyboard-wrap" id="keyboard-hint" style="display:none;">
  <img src="https://miro.medium.com/v2/1*qYGBCM3HT4Kjxsm4UGTN1A.png" alt="Keyboard"/>
  <div class="keyboard-label">Type + Enter</div>
</div>

<!-- RANK POPUP -->
<div class="rank-popup" id="rank-popup">
  <div class="popup-rank-id" id="popup-rank-id">F</div>
  <div class="popup-bonuses" id="popup-bonuses"></div>
  <div class="popup-mult-line">MULTIPLIER <strong id="popup-mult">x1.00</strong></div>
</div>

<!-- RANK UP SCREEN -->
<div class="vl-achieved" id="vl-achieved">
  <div class="vl-achieved-title" id="vl-achieved-title">VISUAL LEARNER</div>
  <div class="vl-achieved-sub" id="vl-achieved-sub">Rank Achieved</div>
  <button class="vl-continue-btn" onclick="document.getElementById('vl-achieved').classList.remove('show')">Continue</button>
</div>

<div id="toast-container"></div>
<script src="app.js"></script>
<script>

// ===== WORD BANK =====
var FALLBACK_WORDS = [
  { word:'abundant',   pos:'adjective', definition:'existing or available in large quantities',    sentence:'The garden was abundant with colorful flowers after the rain.' },
  { word:'benevolent', pos:'adjective', definition:'well meaning and kindly',                       sentence:'The benevolent teacher always helped students after class.' },
  { word:'cautious',   pos:'adjective', definition:'careful to avoid danger or mistakes',           sentence:'She was cautious when crossing the busy street.' },
  { word:'diligent',   pos:'adjective', definition:'showing steady and careful effort',             sentence:'The diligent student studied every night before exams.' },
  { word:'eloquent',   pos:'adjective', definition:'fluent and persuasive in speaking',             sentence:'His eloquent speech moved everyone in the audience.' },
  { word:'fragile',    pos:'adjective', definition:'easily broken or damaged',                      sentence:'Please handle the fragile glass vase with care.' },
  { word:'grateful',   pos:'adjective', definition:'feeling thankful for kindness received',        sentence:'She was grateful for her friend\'s help during the move.' },
  { word:'humble',     pos:'adjective', definition:'not proud or arrogant',                         sentence:'Despite his success, he remained humble and kind.' },
  { word:'immense',    pos:'adjective', definition:'extremely large or great',                      sentence:'The immense mountain towered over the small village.' },
  { word:'joyful',     pos:'adjective', definition:'feeling great happiness',                       sentence:'The children were joyful on the last day of school.' },
  { word:'keen',       pos:'adjective', definition:'having a strong interest or enthusiasm',        sentence:'She had a keen interest in learning new languages.' },
  { word:'luminous',   pos:'adjective', definition:'full of or shedding light; bright',             sentence:'The luminous stars lit up the night sky.' },
  { word:'mysterious', pos:'adjective', definition:'difficult or impossible to understand',         sentence:'The mysterious noise woke everyone in the house.' },
  { word:'noble',      pos:'adjective', definition:'having or showing fine qualities',              sentence:'The noble knight protected the villagers from danger.' },
  { word:'observant',  pos:'adjective', definition:'quick to notice things',                        sentence:'The observant detective spotted the hidden clue.' },
  { word:'patient',    pos:'adjective', definition:'able to wait without becoming upset',           sentence:'A good teacher must be patient with all students.' },
  { word:'radiant',    pos:'adjective', definition:'sending out light; glowing brightly',           sentence:'Her radiant smile lit up the entire room.' },
  { word:'sincere',    pos:'adjective', definition:'genuinely meaning what you say',                sentence:'He gave a sincere apology for arriving late.' },
  { word:'tremendous', pos:'adjective', definition:'very great in amount or level',                 sentence:'The team made a tremendous effort to win the game.' },
  { word:'unique',     pos:'adjective', definition:'being the only one of its kind',                sentence:'Each snowflake has a unique and beautiful pattern.' },
  { word:'vibrant',    pos:'adjective', definition:'full of energy and enthusiasm',                 sentence:'The vibrant city was alive with music and laughter.' },
  { word:'wise',       pos:'adjective', definition:'having experience and good judgment',           sentence:'The wise elder shared stories from his long life.' },
  { word:'zealous',    pos:'adjective', definition:'showing great energy for a cause',              sentence:'The zealous volunteer worked all weekend for the charity.' },
  { word:'ancient',    pos:'adjective', definition:'belonging to the very distant past',            sentence:'The ancient ruins told the story of a lost civilization.' },
  { word:'bold',       pos:'adjective', definition:'willing to take risks and be daring',           sentence:'The bold explorer ventured into the dark jungle alone.' },
  { word:'curious',    pos:'adjective', definition:'eager to know or learn something',              sentence:'The curious cat sniffed at every corner of the room.' },
  { word:'dazzling',   pos:'adjective', definition:'extremely impressive or beautiful',             sentence:'The dazzling fireworks lit up the entire sky.' },
  { word:'elegant',    pos:'adjective', definition:'graceful and stylish in appearance',            sentence:'She wore an elegant dress to the school dance.' },
  { word:'fierce',     pos:'adjective', definition:'very strong or violent in force',               sentence:'The fierce storm knocked down several trees.' },
  { word:'genuine',    pos:'adjective', definition:'truly what it is claimed to be',                sentence:'Her genuine laughter made everyone around her smile.' }
];

// ===== ESSAY SENTENCES (unlocked every 5 perfect sentences) =====
var ESSAY_SENTENCES = [
  'The relationship between environmental conservation and economic development has long been a subject of significant debate among policymakers worldwide.',
  'Throughout history the most transformative technological innovations have consistently emerged from the intersection of creative thinking and rigorous scientific methodology.',
  'The complexity of human emotions and the way they influence decision making processes has fascinated psychologists philosophers and neuroscientists across many generations.',
  'Understanding the fundamental principles of mathematics and logical reasoning provides an essential foundation for success in virtually every academic discipline and professional career.',
  'The rapid advancement of artificial intelligence and machine learning technologies is reshaping industries transforming economies and raising profound questions about the future of human work.',
  'Environmental scientists have long argued that the preservation of biodiversity is not merely an ethical obligation but an absolute necessity for the long term survival of human civilization.',
  'The development of critical thinking skills in young students requires educators to create learning environments that encourage questioning exploration and the thoughtful analysis of complex ideas.',
  'Modern communication technologies have fundamentally altered the way human beings form relationships share information and participate in democratic processes around the world.',
];

// ===== FACTS =====
var FACTS = [
  'Did you know Skylar is short? 😭',
  'Don Don thinks he made this but in truth Lakayden did 🤣'
];
var factIndex = Math.floor(Math.random() * FACTS.length);
var factEl = document.getElementById('loading-fact');
factEl.textContent = FACTS[factIndex];
setInterval(function() {
  factEl.style.opacity = '0';
  setTimeout(function() {
    factIndex = (factIndex + 1) % FACTS.length;
    factEl.textContent = FACTS[factIndex];
    factEl.style.opacity = '1';
  }, 400);
}, 3500);

// ===== NEW RANK SYSTEM =====
var RANKS = [
  { id:'F',              label:'F',              minPts:0,        color:'#555555', name:'Unranked' },
  { id:'D-',             label:'D-',             minPts:250,      color:'#888888', name:'Beginner' },
  { id:'D+',             label:'D+',             minPts:500,      color:'#aaaaaa', name:'Novice' },
  { id:'C-',             label:'C-',             minPts:1100,     color:'#30d158', name:'Learner' },
  { id:'C',              label:'C',              minPts:1850,     color:'#25a244', name:'Student' },
  { id:'C+',             label:'C+',             minPts:2350,     color:'#1a7a32', name:'Achiever' },
  { id:'B-',             label:'B-',             minPts:3000,     color:'#0a84ff', name:'Scholar' },
  { id:'B',              label:'B',              minPts:3500,     color:'#0066cc', name:'Intellectual' },
  { id:'B+',             label:'B+',             minPts:4750,     color:'#0050a0', name:'Advanced' },
  { id:'A-',             label:'A-',             minPts:6000,     color:'#ff9f0a', name:'Expert' },
  { id:'A',              label:'A',              minPts:7000,     color:'#e8890a', name:'Master' },
  { id:'A+',             label:'A+',             minPts:15000,    color:'#ff6b00', name:'Elite' },
  { id:'S',              label:'S',              minPts:35000,    color:'#ff3b30', name:'Legend' },
  { id:'S+',             label:'S+',             minPts:60000,    color:'#ff0050', name:'Mythic' },
  { id:'VOCAB MASTER',   label:'VM',             minPts:184000,   color:'#ffd700', name:'Vocab Master' },
  { id:'VISUAL LEARNER', label:'VL',             minPts:4000000,  color:'#bf5af2', name:'Visual Learner' }
];

// ===== STATE =====
var state = {
  points: 0,
  mult: 1.0,
  streak: 0,
  perfectSentences: 0,
  boostMult: 1.0,
  sentenceLevel: 0,
  qStart: 0
};
var currentMode = 'typing';
var currentWordData = null;
var typingWords = [];
var typingIndex = 0;
var typingResults = [];
var shownRankUps = {};
var popupTimer = null;

// ===== RANK UTILS =====
function getRank(pts) {
  var r = RANKS[0];
  for (var i = 0; i < RANKS.length; i++) {
    if (pts >= RANKS[i].minPts) r = RANKS[i];
  }
  return r;
}

function calcMult(streak, ms) {
  var m = 1.0 + streak * 0.15;
  if (ms < 4000) m += 0.4;
  else if (ms < 7000) m += 0.2;
  return Math.min(parseFloat(m.toFixed(2)), 9.99);
}

function getTotalMult() {
  return parseFloat((state.mult * state.boostMult).toFixed(2));
}

function updateHUD() {
  document.getElementById('hud-pts').textContent = state.points.toLocaleString();
  document.getElementById('hud-mult').textContent = 'x' + getTotalMult().toFixed(2);
  var rank = getRank(state.points);
  var rl = document.getElementById('rank-letter');
  rl.textContent = rank.label;
  rl.style.color = rank.color;
  rl.style.textShadow = '0 0 20px ' + rank.color + '88';
  document.getElementById('rank-name').textContent = rank.name;

  // Boost banner
  var banner = document.getElementById('boost-banner');
  if (state.boostMult > 1) {
    banner.style.display = '';
    banner.textContent = '🔥 ' + state.perfectSentences + ' perfect sentences — ' + state.boostMult.toFixed(2) + 'x boost active!';
  } else {
    banner.style.display = 'none';
  }

  // Rank up celebration
  if (!shownRankUps[rank.id]) {
    shownRankUps[rank.id] = true;
    if (rank.id !== 'F') {
      var title = document.getElementById('vl-achieved-title');
      var sub   = document.getElementById('vl-achieved-sub');
      title.textContent = rank.name.toUpperCase();
      title.style.color = rank.color;
      title.style.animation = '';
      title.style.textShadow = '0 0 60px ' + rank.color;
      sub.textContent = 'New Rank: ' + rank.label;
      document.getElementById('vl-achieved').classList.add('show');
    }
  }
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-typing').classList.toggle('active', mode === 'typing');
  document.getElementById('btn-desc').classList.toggle('active', mode === 'description');
  document.getElementById('keyboard-hint').style.display = mode === 'typing' ? 'block' : 'none';
  loadQuestion();
}

// ===== FETCH WORD =====
async function fetchWord() {
  var target = FALLBACK_WORDS[Math.floor(Math.random() * FALLBACK_WORDS.length)];
  try {
    var res = await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + target.word);
    if (!res.ok) throw new Error('fail');
    var data = await res.json();
    if (!Array.isArray(data) || !data[0]) throw new Error('bad');
    var entry = data[0];
    var meaning = entry.meanings && entry.meanings[0];
    if (!meaning) throw new Error('no meaning');
    var def = meaning.definitions && meaning.definitions[0] && meaning.definitions[0].definition;
    var example = meaning.definitions && meaning.definitions[0] && meaning.definitions[0].example;
    if (!def) throw new Error('no def');
    return {
      word: entry.word || target.word,
      pos: meaning.partOfSpeech || target.pos,
      definition: def,
      sentence: example || target.sentence
    };
  } catch(e) {
    return target;
  }
}

// ===== GET SENTENCE FOR LEVEL =====
function getSentence(data) {
  if (state.sentenceLevel >= 3) {
    return ESSAY_SENTENCES[Math.floor(Math.random() * ESSAY_SENTENCES.length)];
  }
  return data.sentence;
}

// ===== LOAD QUESTION =====
async function loadQuestion() {
  var card = document.getElementById('q-card');
  card.innerHTML = '<div class="q-spinner"></div>';
  currentWordData = await fetchWord();
  if (currentMode === 'typing') {
    buildTypingMode(currentWordData);
  } else {
    buildDescriptionMode(currentWordData);
  }
}

// ===== TYPING MODE =====
function buildTypingMode(data) {
  var sentence = getSentence(data);
  if (!sentence) { loadQuestion(); return; }
  typingWords = sentence.split(' ');
  typingIndex = 0;
  typingResults = [];
  state.qStart = Date.now();
  renderTypingUI(data);
}

function renderTypingUI(data) {
  var card = document.getElementById('q-card');
  card.innerHTML = '';
  var header = document.createElement('div');
  header.innerHTML = '<div class="q-word-display">' + data.word + '</div><div class="q-pos">' + data.pos + (state.sentenceLevel >= 3 ? ' — Essay Level' : '') + '</div>';
  card.appendChild(header);
  var pips = document.createElement('div');
  pips.className = 'word-progress'; pips.id = 'word-pips';
  typingWords.forEach(function(w, i) {
    var pip = document.createElement('div');
    pip.className = 'word-pip' + (i === 0 ? ' current' : '');
    pips.appendChild(pip);
  });
  card.appendChild(pips);
  var sentEl = document.createElement('div');
  sentEl.className = 'typing-sentence'; sentEl.id = 'typing-sentence';
  updateSentenceDisplay(sentEl);
  card.appendChild(sentEl);
  var inputWrap = document.createElement('div');
  inputWrap.className = 'type-input-wrap';
  var inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'type-input'; inp.id = 'type-input';
  inp.placeholder = 'Type the highlighted word...';
  inp.autocomplete = 'off'; inp.autocorrect = 'off'; inp.spellcheck = false;
  var submitBtn = document.createElement('button');
  submitBtn.className = 'type-submit'; submitBtn.textContent = 'Enter';
  inputWrap.appendChild(inp); inputWrap.appendChild(submitBtn);
  card.appendChild(inputWrap);
  var feedback = document.createElement('div');
  feedback.className = 'type-feedback'; feedback.id = 'type-feedback';
  card.appendChild(feedback);
  submitBtn.addEventListener('click', submitTyping);
  inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') submitTyping(); });
  setTimeout(function() { inp.focus(); }, 100);
}

function updateSentenceDisplay(el) {
  if (!el) el = document.getElementById('typing-sentence');
  if (!el) return;
  el.innerHTML = typingWords.map(function(w, i) {
    if (i < typingIndex) return '<span class="word-' + (typingResults[i] ? 'correct' : 'wrong') + '">' + w + '</span>';
    if (i === typingIndex) return '<span class="word-highlight">' + w + '</span>';
    return '<span>' + w + '</span>';
  }).join(' ');
}

function submitTyping() {
  var inp = document.getElementById('type-input');
  var feedback = document.getElementById('type-feedback');
  if (!inp) return;
  var typed = inp.value.trim().toLowerCase();
  var target = typingWords[typingIndex].replace(/[^a-zA-Z']/g, '').toLowerCase();
  var isCorrect = typed === target;
  typingResults[typingIndex] = isCorrect;
  inp.classList.add(isCorrect ? 'correct-flash' : 'wrong-flash');
  setTimeout(function() { inp.classList.remove('correct-flash', 'wrong-flash'); }, 400);
  inp.value = '';
  if (isCorrect) {
    feedback.textContent = '✓ Correct!';
    feedback.className = 'type-feedback correct';
  } else {
    feedback.textContent = '✗ Should be: "' + typingWords[typingIndex].replace(/[^a-zA-Z']/g, '') + '"';
    feedback.className = 'type-feedback wrong';
  }
  var pips = document.querySelectorAll('.word-pip');
  if (pips[typingIndex]) {
    pips[typingIndex].classList.remove('current');
    pips[typingIndex].classList.add(isCorrect ? 'done-correct' : 'done-wrong');
  }
  typingIndex++;
  if (typingIndex < typingWords.length) {
    updateSentenceDisplay();
    if (pips[typingIndex]) pips[typingIndex].classList.add('current');
    setTimeout(function() { feedback.textContent = ''; feedback.className = 'type-feedback'; }, 800);
  } else {
    var correctCount = typingResults.filter(Boolean).length;
    var total = typingWords.length;
    var ms = Date.now() - state.qStart;
    var allCorrect = correctCount === total;
    var ptsEarned = Math.round(150 * getTotalMult());

    if (allCorrect) {
      state.streak++;
      state.points += ptsEarned;
      state.perfectSentences++;
      // Every 5 perfect sentences — 1.5x boost + longer sentences
      if (state.perfectSentences % 5 === 0) {
        state.boostMult = parseFloat((state.boostMult * 1.5).toFixed(2));
        state.sentenceLevel = Math.floor(state.perfectSentences / 5);
        showToast('🔥 ' + state.perfectSentences + ' perfect! 1.5x boost — sentences get harder!', 'success');
      }
      state.mult = calcMult(state.streak, ms);
      document.body.classList.add('shake');
      setTimeout(function() { document.body.classList.remove('shake'); }, 150);
      showRankPopup(['PERFECT SENTENCE', '+' + ptsEarned + ' pts']);
      saveStats(true, ptsEarned);
    } else {
      state.streak = 0;
      state.mult = Math.max(1.0, parseFloat((state.mult - 0.2).toFixed(2)));
      var partial = correctCount > 0 ? Math.round((correctCount / total) * ptsEarned) : 0;
      if (partial > 0) { state.points += partial; saveStats(false, partial); }
      showRankPopup(['INCOMPLETE — ' + correctCount + '/' + total, partial > 0 ? '+' + partial + ' pts' : 'No points']);
    }
    updateHUD();
    saveTournamentScore();
    feedback.textContent = allCorrect ? '🎉 Perfect! +' + ptsEarned + ' pts — next word...' : correctCount + '/' + total + ' correct — next word...';
    feedback.className = 'type-feedback ' + (allCorrect ? 'correct' : 'wrong');
    setTimeout(loadQuestion, 2200);
  }
}

// ===== DESCRIPTION MODE =====
function buildDescriptionMode(data) {
  var wrongs = shuffle(FALLBACK_WORDS.filter(function(w) { return w.word !== data.word; })).slice(0, 3).map(function(w) { return w.word; });
  var choices = shuffle([data.word].concat(wrongs));
  state.qStart = Date.now();
  var card = document.getElementById('q-card');
  card.innerHTML = '';
  var header = document.createElement('div');
  header.innerHTML = '<div class="q-pos" style="margin-bottom:4px;">What word matches this description?</div>';
  card.appendChild(header);
  var descEl = document.createElement('div');
  descEl.className = 'desc-text'; descEl.textContent = data.definition;
  card.appendChild(descEl);
  var choicesEl = document.createElement('div');
  choicesEl.className = 'q-choices';
  choices.forEach(function(choice, i) {
    var btn = document.createElement('button');
    btn.className = 'choice-btn'; btn.setAttribute('data-choice', choice);
    btn.innerHTML = '<span style="font-weight:700;color:#0a84ff;margin-right:8px;">' + (i + 1) + '</span>' + choice;
    btn.addEventListener('click', function() { handleDescAnswer(choice, btn, data.word); });
    choicesEl.appendChild(btn);
  });
  card.appendChild(choicesEl);
}

function handleDescAnswer(chosen, btn, correctWord) {
  var ms = Date.now() - state.qStart;
  var isCorrect = chosen === correctWord;
  document.querySelectorAll('.choice-btn').forEach(function(b) {
    b.disabled = true;
    if (b.getAttribute('data-choice') === correctWord) b.classList.add('correct');
  });
  var ptsEarned = Math.round(150 * getTotalMult());
  if (!isCorrect) {
    btn.classList.add('wrong');
    state.streak = 0;
    state.mult = Math.max(1.0, parseFloat((state.mult - 0.25).toFixed(2)));
    showRankPopup(['INTERRUPTION']);
  } else {
    state.streak++;
    state.points += ptsEarned;
    state.mult = calcMult(state.streak, ms);
    var bonuses = ['+' + ptsEarned + ' pts'];
    if (ms < 3000) bonuses.push('QUICK ANSWER');
    if (state.streak === 3) bonuses.push('TRIPLE STREAK');
    if (state.streak === 5) bonuses.push('QUINTUPLE STREAK');
    showRankPopup(bonuses);
    document.body.classList.add('shake');
    setTimeout(function() { document.body.classList.remove('shake'); }, 150);
    saveStats(true, ptsEarned);
  }
  updateHUD();
  saveTournamentScore();
  setTimeout(loadQuestion, 1800);
}

// 1-4 keyboard for description mode
document.addEventListener('keydown', function(e) {
  if (currentMode !== 'description') return;
  var keys = {'1':0,'2':1,'3':2,'4':3};
  if (keys[e.key] !== undefined) {
    var btns = document.querySelectorAll('.choice-btn:not(:disabled)');
    if (btns[keys[e.key]]) btns[keys[e.key]].click();
  }
});

// ===== RANK POPUP =====
function showRankPopup(lines) {
  var rank = getRank(state.points);
  var popup = document.getElementById('rank-popup');
  document.getElementById('popup-rank-id').textContent = rank.label;
  document.getElementById('popup-rank-id').style.color = rank.color;
  document.getElementById('popup-mult').textContent = 'x' + getTotalMult().toFixed(2);
  var bonusEl = document.getElementById('popup-bonuses');
  bonusEl.innerHTML = '';
  lines.forEach(function(b) {
    var el = document.createElement('div'); el.className = 'popup-bonus'; el.textContent = b;
    bonusEl.appendChild(el);
  });
  popup.classList.add('show');
  if (popupTimer) clearTimeout(popupTimer);
  popupTimer = setTimeout(function() { popup.classList.remove('show'); }, 2400);
}

// ===== SAVE STATS (global leaderboard) =====
function saveStats(correct, pts) {
  var user = firebase.auth().currentUser;
  if (!user) return;
  var ref = firebase.firestore().collection('users').doc(user.uid);
  var upd = { totalAnswered: firebase.firestore.FieldValue.increment(1) };
  if (correct && pts > 0) upd.totalPoints = firebase.firestore.FieldValue.increment(pts);
  ref.update(upd).catch(function(){});
  ref.get().then(function(doc) {
    if (doc.exists && (doc.data().bestStreak || 0) < state.streak) {
      ref.update({ bestStreak: state.streak });
    }
  });
}

// ===== TOURNAMENT =====
function saveTournamentScore() {
  var user = firebase.auth().currentUser;
  if (!user) return;
  firebase.firestore().collection('users').doc(user.uid).get().then(function(doc) {
    if (!doc.exists) return;
    var codes = doc.data().classroomCodes || [];
    if (doc.data().classroomCode) codes.push(doc.data().classroomCode);
    codes = [...new Set(codes)];
    codes.forEach(function(code) {
      firebase.firestore().collection('classrooms').doc(code)
        .collection('tournament').doc('lobby').get().then(function(snap) {
          if (!snap.exists || snap.data().status !== 'active') return;
          var upd = {};
          upd['players.' + user.uid + '.points'] = state.points;
          snap.ref.update(upd);
        });
    });
  });
}

// ===== SEQUENCE =====
function startSequence() {
  var loading = document.getElementById('game-loading');
  var intro   = document.getElementById('intro-overlay');
  var game    = document.getElementById('game-wrap');
  setTimeout(function() {
    loading.style.opacity = '0';
    setTimeout(function() {
      loading.style.display = 'none';
      intro.style.display = 'flex'; intro.style.opacity = '0';
      setTimeout(function() { intro.style.opacity = '1'; }, 30);
      setTimeout(function() {
        intro.style.opacity = '0';
        setTimeout(function() {
          intro.style.display = 'none';
          game.style.display = 'flex';
          loadQuestion();
        }, 700);
      }, 3000);
    }, 600);
  }, 2000);
}

function showToast(msg, type) {
  type = type || '';
  var c = document.getElementById('toast-container');
  if (!c) return;
  var t = document.createElement('div');
  t.className = 'toast ' + type; t.textContent = msg;
  c.appendChild(t);
  setTimeout(function() { t.remove(); }, 3200);
}

// ===== INIT =====
firebase.auth().onAuthStateChanged(function(user) {
  if (!user) return window.location.href = 'login.html';
  firebase.firestore().collection('users').doc(user.uid).get().then(function(doc) {
    var backBtn = document.getElementById('back-btn');
    if (doc.exists) {
      var role = doc.data().role;
      if (role === 'admin')        backBtn.href = 'admin-home.html';
      else if (role === 'teacher') backBtn.href = 'teacher-home.html';
      else                         backBtn.href = 'student-home.html';
    }
  });
  startSequence();
});
